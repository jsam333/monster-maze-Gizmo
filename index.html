<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Maze</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      background: #0f1115;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    /* 500×718 — width drives height via aspect-ratio; fits inside viewport without stretching */
    .game-shell {
      --shell-w: 500;
      --shell-h: 718;
      aspect-ratio: var(--shell-w) / var(--shell-h);
      width: min(500px, 100vw, calc(100dvh * var(--shell-w) / var(--shell-h)));
      height: auto;
      max-width: 100vw;
      max-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #151922;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      position: relative;
      overflow: hidden;
      container-type: size;
      container-name: game;
    }

    .maze-area {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #12151c;
    }

    #mazeCanvas {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      touch-action: none;
    }

    .dpad {
      flex: 0 0 calc(100% * 210 / 718);
      padding: 4px;
      display: grid;
      grid-template-columns: 3fr 4fr 3fr;
      grid-template-rows: 1fr;
      align-items: stretch;
      gap: 4px;
      min-height: 0;
      background: linear-gradient(180deg, #1a1f2a 0%, #151922 100%);
      border-top: 1px solid #2a3140;
    }

    .dpad-center {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      gap: 4px;
    }

    .dpad-btn {
      margin: 0;
      padding: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: clamp(2rem, 10cqw, 2.7rem);
      line-height: 1;
      color: #c8d4e6;
      background: #252b38;
      border: 2px solid #3d4658;
      border-radius: 10px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: filter 0.08s ease, border-color 0.08s ease, background 0.08s ease;
    }

    .dpad-btn-label {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    /* Full-button translucent white fill, grows bottom → top while greyed out */
    .dpad-cooldown-sheen {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      overflow: hidden;
      pointer-events: none;
      z-index: 2;
    }

    .dpad-cooldown-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 100%;
      width: 100%;
      transform-origin: bottom center;
      transform: scaleY(0);
      background: rgba(255, 255, 255, 0.28);
    }

    .dpad-btn--cooling {
      filter: grayscale(0.9) brightness(0.65);
      color: #8899aa;
      border-color: #2d3544;
      background: #1a1f28;
    }

    .dpad-btn--side {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      align-self: stretch;
      justify-self: stretch;
      border-radius: 10px;
    }

    .dpad-btn--ns {
      flex: 1 1 0;
      min-height: 0;
      width: 100%;
    }

    .dpad-btn:active:not(.dpad-btn--cooling) {
      background: #323a4a;
      border-color: #5a6a82;
    }

    .win-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: rgba(10, 12, 18, 0.88);
      backdrop-filter: blur(4px);
      z-index: 10;
    }

    .win-overlay.hidden {
      display: none;
    }

    .win-title {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      color: #e8eef8;
    }

    .win-btn {
      min-height: 48px;
      padding: 0 28px;
      font-size: 1rem;
      font-weight: 600;
      color: #1a1d24;
      background: #50c878;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .win-btn:active {
      filter: brightness(0.92);
    }
  </style>
</head>
<body>
  <div class="game-shell" id="gameShell">
    <div class="maze-area">
      <canvas id="mazeCanvas" width="500" height="508" aria-label="Maze"></canvas>
    </div>
    <div class="dpad" role="group" aria-label="Move">
      <button type="button" class="dpad-btn dpad-btn--side" data-dir="west" aria-label="Move left">
        <span class="dpad-btn-label">◀</span>
        <span class="dpad-cooldown-sheen" aria-hidden="true"><span class="dpad-cooldown-fill"></span></span>
      </button>
      <div class="dpad-center">
        <button type="button" class="dpad-btn dpad-btn--ns" data-dir="north" aria-label="Move up">
          <span class="dpad-btn-label">▲</span>
          <span class="dpad-cooldown-sheen" aria-hidden="true"><span class="dpad-cooldown-fill"></span></span>
        </button>
        <button type="button" class="dpad-btn dpad-btn--ns" data-dir="south" aria-label="Move down">
          <span class="dpad-btn-label">▼</span>
          <span class="dpad-cooldown-sheen" aria-hidden="true"><span class="dpad-cooldown-fill"></span></span>
        </button>
      </div>
      <button type="button" class="dpad-btn dpad-btn--side" data-dir="east" aria-label="Move right">
        <span class="dpad-btn-label">▶</span>
        <span class="dpad-cooldown-sheen" aria-hidden="true"><span class="dpad-cooldown-fill"></span></span>
      </button>
    </div>
    <div class="win-overlay hidden" id="winOverlay" aria-hidden="true">
      <p class="win-title">You escaped</p>
      <button type="button" class="win-btn" id="newMazeBtn">New maze</button>
    </div>
    <div class="win-overlay hidden" id="loseOverlay" aria-hidden="true">
      <p class="win-title">Caught!</p>
      <button type="button" class="win-btn" id="loseNewBtn">New maze</button>
    </div>
  </div>
  <script>
    (function () {
      "use strict";

      var N = 1;
      var E = 2;
      var S = 4;
      var W = 8;
      var ALL = N | E | S | W;

      var canvas = document.getElementById("mazeCanvas");
      var ctx = canvas.getContext("2d");
      var winOverlay = document.getElementById("winOverlay");
      var loseOverlay = document.getElementById("loseOverlay");
      var newMazeBtn = document.getElementById("newMazeBtn");
      var loseNewBtn = document.getElementById("loseNewBtn");

      var rows;
      var cols;
      var cellSize;
      var grid;
      var playerR;
      var playerC;
      var playerGlideActive;
      var playerGlideStartMs;
      var playerGlideFr;
      var playerGlideFc;
      var playerGlideTr;
      var playerGlideTc;
      var PLAYER_GLIDE_MS = 100;
      /** One upcoming move buffered while the player glide is active (valid from current logical tile). */
      var bufferedPlayerDir = null;
      var mazeW;
      var mazeH;
      var offsetX;
      var offsetY;

      var monsterR;
      var monsterC;
      var monsterGlideActive;
      var monsterGlideStartMs;
      var monsterGlideFr;
      var monsterGlideFc;
      var monsterGlideTr;
      var monsterGlideTc;
      /** Time to cross one tile at constant speed (linear; segments chain with no pause). */
      var MONSTER_TILE_MS = 750;

      function cellKey(r, c) {
        return r + "," + c;
      }

      function gameActive() {
        return winOverlay.classList.contains("hidden") && loseOverlay.classList.contains("hidden");
      }

      function tileCenterPixel(tc, tr) {
        return {
          x: offsetX + (tc + 0.5) * cellSize,
          y: offsetY + (tr + 0.5) * cellSize
        };
      }

      function getMonsterPixelPos(now) {
        if (monsterGlideActive) {
          var u = (now - monsterGlideStartMs) / MONSTER_TILE_MS;
          if (u < 0) u = 0;
          if (u > 1) u = 1;
          var a = tileCenterPixel(monsterGlideFc, monsterGlideFr);
          var b = tileCenterPixel(monsterGlideTc, monsterGlideTr);
          return { x: a.x + (b.x - a.x) * u, y: a.y + (b.y - a.y) * u };
        }
        return tileCenterPixel(monsterC, monsterR);
      }

      function getPlayerPixelPos(now) {
        if (playerGlideActive) {
          var praw = (now - playerGlideStartMs) / PLAYER_GLIDE_MS;
          if (praw < 0) praw = 0;
          if (praw > 1) praw = 1;
          var pu = praw * praw * (3 - 2 * praw);
          var pfr = playerGlideFr + (playerGlideTr - playerGlideFr) * pu;
          var pfc = playerGlideFc + (playerGlideTc - playerGlideFc) * pu;
          return {
            x: offsetX + (pfc + 0.5) * cellSize,
            y: offsetY + (pfr + 0.5) * cellSize
          };
        }
        return tileCenterPixel(playerC, playerR);
      }

      function playerHitRadius() {
        return cellSize * 0.32;
      }

      function monsterHitRadius() {
        return cellSize * 0.3;
      }

      function hitboxesOverlap(now) {
        var p = getPlayerPixelPos(now);
        var m = getMonsterPixelPos(now);
        var rp = playerHitRadius();
        var rm = monsterHitRadius();
        var dx = p.x - m.x;
        var dy = p.y - m.y;
        var sum = rp + rm;
        return dx * dx + dy * dy <= sum * sum;
      }

      function triggerLose() {
        loseOverlay.classList.remove("hidden");
        loseOverlay.setAttribute("aria-hidden", "false");
      }

      /** Squared distance from point P to segment AB. */
      function distPointSegSq(px, py, ax, ay, bx, by) {
        var dx = bx - ax;
        var dy = by - ay;
        var lenSq = dx * dx + dy * dy;
        if (lenSq < 1e-8) {
          var qx = px - ax;
          var qy = py - ay;
          return qx * qx + qy * qy;
        }
        var t = ((px - ax) * dx + (py - ay) * dy) / lenSq;
        if (t < 0) t = 0;
        else if (t > 1) t = 1;
        var cx = ax + t * dx;
        var cy = ay + t * dy;
        var ex = px - cx;
        var ey = py - cy;
        return ex * ex + ey * ey;
      }

      /** Alpha 0..1 for preview line: invisible near enemy, full opacity past outer radius (smoothstep in between). */
      function previewLineAlphaFromDistSq(distSq, innerRSq, outerRSq) {
        if (distSq >= outerRSq) return 1;
        if (distSq <= innerRSq) return 0;
        var d = Math.sqrt(distSq);
        var innerR = Math.sqrt(innerRSq);
        var outerR = Math.sqrt(outerRSq);
        var t = (d - innerR) / (outerR - innerR);
        if (t < 0) t = 0;
        if (t > 1) t = 1;
        return t * t * (3 - 2 * t);
      }

      function walkNeighbors(r, c) {
        var out = [];
        var w = grid[r][c];
        if (!(w & N) && r > 0) out.push([r - 1, c]);
        if (!(w & E) && c < cols - 1) out.push([r, c + 1]);
        if (!(w & S) && r < rows - 1) out.push([r + 1, c]);
        if (!(w & W) && c > 0) out.push([r, c - 1]);
        return out;
      }

      function shortestPath(sr, sc, tr, tc) {
        if (sr === tr && sc === tc) {
          return [{ r: sr, c: sc }];
        }
        var parent = {};
        var vis = {};
        var q = [[sr, sc]];
        vis[cellKey(sr, sc)] = true;
        var qi = 0;
        while (qi < q.length) {
          var cur = q[qi++];
          var cr = cur[0];
          var cc = cur[1];
          var nbs = walkNeighbors(cr, cc);
          var ni;
          for (ni = 0; ni < nbs.length; ni++) {
            var nb = nbs[ni];
            var nr = nb[0];
            var nc = nb[1];
            var k = cellKey(nr, nc);
            if (vis[k]) continue;
            vis[k] = true;
            parent[k] = [cr, cc];
            if (nr === tr && nc === tc) {
              var path = [];
              var pr = tr;
              var pc = tc;
              while (true) {
                path.push({ r: pr, c: pc });
                if (pr === sr && pc === sc) break;
                var p = parent[cellKey(pr, pc)];
                pr = p[0];
                pc = p[1];
              }
              path.reverse();
              return path;
            }
            q.push([nr, nc]);
          }
        }
        return [{ r: sr, c: sc }];
      }

      function shuffleInPlace(arr) {
        var i = arr.length;
        while (i > 1) {
          var j = (Math.random() * i) | 0;
          i--;
          var t = arr[i];
          arr[i] = arr[j];
          arr[j] = t;
        }
        return arr;
      }

      function generateMaze(r, c) {
        var g = [];
        var vis = [];
        var ri;
        for (ri = 0; ri < r; ri++) {
          g.push([]);
          vis.push([]);
          var ci;
          for (ci = 0; ci < c; ci++) {
            g[ri].push(ALL);
            vis[ri].push(false);
          }
        }

        var stack = [[0, 0]];
        vis[0][0] = true;

        while (stack.length) {
          var top = stack[stack.length - 1];
          var cr = top[0];
          var cc = top[1];
          var nbs = [];

          if (cr > 0 && !vis[cr - 1][cc]) {
            nbs.push({ nr: cr - 1, nc: cc, curMask: N, neighMask: S });
          }
          if (cc < c - 1 && !vis[cr][cc + 1]) {
            nbs.push({ nr: cr, nc: cc + 1, curMask: E, neighMask: W });
          }
          if (cr < r - 1 && !vis[cr + 1][cc]) {
            nbs.push({ nr: cr + 1, nc: cc, curMask: S, neighMask: N });
          }
          if (cc > 0 && !vis[cr][cc - 1]) {
            nbs.push({ nr: cr, nc: cc - 1, curMask: W, neighMask: E });
          }

          if (nbs.length) {
            shuffleInPlace(nbs);
            var nb = nbs[0];
            g[cr][cc] &= ~nb.curMask;
            g[nb.nr][nb.nc] &= ~nb.neighMask;
            vis[nb.nr][nb.nc] = true;
            stack.push([nb.nr, nb.nc]);
          } else {
            stack.pop();
          }
        }

        return g;
      }

      function listClosedInternalWalls(g, r, c) {
        var list = [];
        var ri;
        var ci;
        for (ri = 0; ri < r; ri++) {
          for (ci = 0; ci < c; ci++) {
            if (ci < c - 1 && (g[ri][ci] & E)) {
              list.push({ ri: ri, ci: ci, ax: "E" });
            }
            if (ri < r - 1 && (g[ri][ci] & S)) {
              list.push({ ri: ri, ci: ci, ax: "S" });
            }
          }
        }
        return list;
      }

      function openWallEdge(g, w) {
        if (w.ax === "E") {
          g[w.ri][w.ci] &= ~E;
          g[w.ri][w.ci + 1] &= ~W;
        } else {
          g[w.ri][w.ci] &= ~S;
          g[w.ri + 1][w.ci] &= ~N;
        }
      }

      /**
       * One pass: open floor(8% of closed internal walls). No two openings share a cell
       * (each wall touches two cells — none of those cells may appear on another chosen wall),
       * so shortcuts stay at least one cell apart on the grid.
       */
      function punchExtraPassages(g, r, c) {
        var walls = listClosedInternalWalls(g, r, c);
        var k = Math.floor(walls.length * 0.08);
        shuffleInPlace(walls);
        var used = [];
        var ri;
        var ci;
        for (ri = 0; ri < r; ri++) {
          used.push([]);
          for (ci = 0; ci < c; ci++) {
            used[ri].push(false);
          }
        }
        var chosen = [];
        var i;
        for (i = 0; i < walls.length && chosen.length < k; i++) {
          var w = walls[i];
          var r0;
          var c0;
          var r1;
          var c1;
          if (w.ax === "E") {
            r0 = w.ri;
            c0 = w.ci;
            r1 = w.ri;
            c1 = w.ci + 1;
          } else {
            r0 = w.ri;
            c0 = w.ci;
            r1 = w.ri + 1;
            c1 = w.ci;
          }
          if (used[r0][c0] || used[r1][c1]) {
            continue;
          }
          used[r0][c0] = true;
          used[r1][c1] = true;
          chosen.push(w);
        }
        for (i = 0; i < chosen.length; i++) {
          openWallEdge(g, chosen[i]);
        }
      }

      function layoutMaze() {
        var cw = canvas.width;
        var ch = canvas.height;
        cols = 8;
        rows = 8;
        cellSize = Math.floor(Math.min(cw / cols, ch / rows));
        mazeW = cols * cellSize;
        mazeH = rows * cellSize;
        offsetX = Math.floor((cw - mazeW) / 2);
        offsetY = Math.floor((ch - mazeH) / 2);
      }

      function newGame() {
        layoutMaze();
        grid = generateMaze(rows, cols);
        punchExtraPassages(grid, rows, cols);
        playerR = 0;
        playerC = 0;
        playerGlideActive = false;
        bufferedPlayerDir = null;
        monsterR = rows - 1;
        monsterC = cols - 1;
        monsterGlideActive = false;
        winOverlay.classList.add("hidden");
        winOverlay.setAttribute("aria-hidden", "true");
        loseOverlay.classList.add("hidden");
        loseOverlay.setAttribute("aria-hidden", "true");
        resetCooldowns();
        draw();
      }

      function draw() {
        var cw = canvas.width;
        var ch = canvas.height;
        ctx.fillStyle = "#1a1d24";
        ctx.fillRect(0, 0, cw, ch);

        ctx.strokeStyle = "#7eb8da";
        ctx.lineWidth = 2;
        ctx.lineCap = "square";

        var r;
        var c;
        for (r = 0; r < rows; r++) {
          for (c = 0; c < cols; c++) {
            var x = offsetX + c * cellSize;
            var y = offsetY + r * cellSize;
            var w = grid[r][c];
            ctx.beginPath();
            if (w & N) {
              ctx.moveTo(x, y);
              ctx.lineTo(x + cellSize, y);
            }
            if (w & W) {
              ctx.moveTo(x, y);
              ctx.lineTo(x, y + cellSize);
            }
            if (c === cols - 1 && (w & E)) {
              ctx.moveTo(x + cellSize, y);
              ctx.lineTo(x + cellSize, y + cellSize);
            }
            if (r === rows - 1 && (w & S)) {
              ctx.moveTo(x, y + cellSize);
              ctx.lineTo(x + cellSize, y + cellSize);
            }
            ctx.stroke();
          }
        }

        var gx = offsetX + (cols - 1) * cellSize + cellSize / 2;
        var gy = offsetY + (rows - 1) * cellSize + cellSize / 2;
        ctx.fillStyle = "rgba(80, 200, 120, 0.35)";
        ctx.beginPath();
        ctx.arc(gx, gy, cellSize * 0.38, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#50c878";
        ctx.lineWidth = 2;
        ctx.stroke();

        var nowDraw = performance.now();
        if (gameActive()) {
          var mpos = getMonsterPixelPos(nowDraw);
          var mx = mpos.x;
          var my = mpos.y;
          var lineFadeInnerSq = cellSize * cellSize * 0.3 * 0.3;
          var lineFadeOuterSq = cellSize * cellSize * 0.58 * 0.58;

          var pathM = null;
          if (monsterGlideActive) {
            pathM = shortestPath(monsterGlideTr, monsterGlideTc, playerR, playerC);
          } else {
            var stepToNext = shortestPath(monsterR, monsterC, playerR, playerC);
            if (stepToNext.length >= 2) {
              pathM = shortestPath(stepToNext[1].r, stepToNext[1].c, playerR, playerC);
            }
          }
          if (pathM !== null && pathM.length >= 2) {
            var maxJ = pathM.length - 2;
            if (maxJ > 4) maxJ = 4;
            var segCount = maxJ >= 1 ? maxJ : 1;
            ctx.save();
            ctx.lineWidth = Math.max(2, cellSize * 0.065);
            ctx.lineCap = "round";
            var vi;
            for (vi = 0; vi < segCount; vi++) {
              if (vi + 1 >= pathM.length) break;
              var v0 = pathM[vi];
              var v1 = pathM[vi + 1];
              var x0 = offsetX + v0.c * cellSize + cellSize / 2;
              var y0 = offsetY + v0.r * cellSize + cellSize / 2;
              var x1 = offsetX + v1.c * cellSize + cellSize / 2;
              var y1 = offsetY + v1.r * cellSize + cellSize / 2;
              var segLen = Math.sqrt((x1 - x0) * (x1 - x0) + (y1 - y0) * (y1 - y0));
              var subSteps = Math.ceil(segLen / (cellSize * 0.1));
              if (subSteps < 8) subSteps = 8;
              if (subSteps > 40) subSteps = 40;
              var s;
              for (s = 0; s < subSteps; s++) {
                var ft0 = s / subSteps;
                var ft1 = (s + 1) / subSteps;
                var sx0 = x0 + (x1 - x0) * ft0;
                var sy0 = y0 + (y1 - y0) * ft0;
                var sx1 = x0 + (x1 - x0) * ft1;
                var sy1 = y0 + (y1 - y0) * ft1;
                var dSq = distPointSegSq(mx, my, sx0, sy0, sx1, sy1);
                var a = previewLineAlphaFromDistSq(dSq, lineFadeInnerSq, lineFadeOuterSq);
                if (a < 0.02) continue;
                ctx.strokeStyle = "rgba(210, 35, 45, " + 0.82 * a + ")";
                ctx.beginPath();
                ctx.moveTo(sx0, sy0);
                ctx.lineTo(sx1, sy1);
                ctx.stroke();
              }
            }
            ctx.restore();
          }
          ctx.fillStyle = "rgba(180, 60, 200, 0.45)";
          ctx.beginPath();
          ctx.arc(mx, my, cellSize * 0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#c060d8";
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        var ppos = getPlayerPixelPos(nowDraw);
        var px = ppos.x;
        var py = ppos.y;
        ctx.fillStyle = "#f4a742";
        ctx.beginPath();
        ctx.arc(px, py, cellSize * 0.32, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#e8941a";
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      var DIRS = ["north", "south", "east", "west"];
      var COOLDOWN_MS = 500;
      var QUEUE_WINDOW_MS = 100;
      var cooldownEnd = { north: 0, south: 0, east: 0, west: 0 };
      var cooldownStart = { north: 0, south: 0, east: 0, west: 0 };
      var queued = { north: false, south: false, east: false, west: false };
      var KEY_TO_DIR = {
        ArrowUp: "north",
        ArrowDown: "south",
        ArrowLeft: "west",
        ArrowRight: "east"
      };

      function canStepFrom(r, c, dir) {
        var w = grid[r][c];
        if (dir === "north") return !(w & N) && r > 0;
        if (dir === "south") return !(w & S) && r < rows - 1;
        if (dir === "east") return !(w & E) && c < cols - 1;
        if (dir === "west") return !(w & W) && c > 0;
        return false;
      }

      function attemptMove(dir) {
        if (!gameActive()) return false;
        if (playerGlideActive) return false;

        if (!canStepFrom(playerR, playerC, dir)) return false;

        var nr = playerR;
        var nc = playerC;
        if (dir === "north") nr--;
        else if (dir === "south") nr++;
        else if (dir === "east") nc++;
        else nc--;

        var oldPr = playerR;
        var oldPc = playerC;
        playerR = nr;
        playerC = nc;

        var moveNow = performance.now();
        var pfr;
        var pfc;
        if (playerGlideActive) {
          var pRawU = (moveNow - playerGlideStartMs) / PLAYER_GLIDE_MS;
          if (pRawU < 0) pRawU = 0;
          if (pRawU > 1) pRawU = 1;
          var pSmooth = pRawU * pRawU * (3 - 2 * pRawU);
          pfr = playerGlideFr + (playerGlideTr - playerGlideFr) * pSmooth;
          pfc = playerGlideFc + (playerGlideTc - playerGlideFc) * pSmooth;
        } else {
          pfr = oldPr;
          pfc = oldPc;
        }
        playerGlideFr = pfr;
        playerGlideFc = pfc;
        playerGlideTr = playerR;
        playerGlideTc = playerC;
        playerGlideStartMs = moveNow;
        playerGlideActive = true;

        if (hitboxesOverlap(moveNow)) {
          triggerLose();
          return true;
        }
        if (playerR === rows - 1 && playerC === cols - 1) {
          winOverlay.classList.remove("hidden");
          winOverlay.setAttribute("aria-hidden", "false");
        }
        return true;
      }

      function startCooldown(dir, now) {
        cooldownStart[dir] = now;
        cooldownEnd[dir] = now + COOLDOWN_MS;
      }

      function resetCooldowns() {
        DIRS.forEach(function (dir) {
          cooldownEnd[dir] = 0;
          cooldownStart[dir] = 0;
          queued[dir] = false;
        });
        DIRS.forEach(function (dir) {
          var btn = document.querySelector('.dpad-btn[data-dir="' + dir + '"]');
          if (!btn) return;
          var fill = btn.querySelector(".dpad-cooldown-fill");
          if (fill) fill.style.transform = "scaleY(0)";
          btn.classList.remove("dpad-btn--cooling");
        });
      }

      function tickMonster(now) {
        if (!gameActive()) return;
        var guard = 0;
        while (guard < 32) {
          guard++;
          if (monsterGlideActive) {
            if (now < monsterGlideStartMs + MONSTER_TILE_MS) {
              return;
            }
            monsterR = monsterGlideTr;
            monsterC = monsterGlideTc;
            monsterGlideActive = false;
            if (hitboxesOverlap(now)) {
              triggerLose();
              return;
            }
            continue;
          }
          var path = shortestPath(monsterR, monsterC, playerR, playerC);
          if (path.length < 2) {
            if (hitboxesOverlap(now)) {
              triggerLose();
            }
            return;
          }
          monsterGlideFr = monsterR;
          monsterGlideFc = monsterC;
          monsterGlideTr = path[1].r;
          monsterGlideTc = path[1].c;
          monsterGlideStartMs = now;
          monsterGlideActive = true;
          return;
        }
      }

      function requestMove(dir) {
        if (!gameActive()) return;
        var now = performance.now();
        if (playerGlideActive) {
          if (canStepFrom(playerR, playerC, dir)) {
            bufferedPlayerDir = dir;
          }
          return;
        }
        if (now >= cooldownEnd[dir]) {
          if (attemptMove(dir)) {
            startCooldown(dir, now);
            queued[dir] = false;
          }
          return;
        }
        var left = cooldownEnd[dir] - now;
        if (left <= QUEUE_WINDOW_MS && left > 0) {
          queued[dir] = true;
        }
      }

      function tickGame() {
        var now = performance.now();
        tickMonster(now);
        if (gameActive() && hitboxesOverlap(now)) {
          triggerLose();
        }
        if (playerGlideActive && now >= playerGlideStartMs + PLAYER_GLIDE_MS) {
          playerGlideActive = false;
          if (bufferedPlayerDir !== null && gameActive()) {
            var nextDir = bufferedPlayerDir;
            bufferedPlayerDir = null;
            if (canStepFrom(playerR, playerC, nextDir)) {
              if (attemptMove(nextDir)) {
                startCooldown(nextDir, now);
              }
            }
          }
        }
        DIRS.forEach(function (dir) {
          var btn = document.querySelector('.dpad-btn[data-dir="' + dir + '"]');
          if (!btn) return;
          var fill = btn.querySelector(".dpad-cooldown-fill");
          if (now >= cooldownEnd[dir]) {
            if (queued[dir]) {
              queued[dir] = false;
              if (playerGlideActive) {
                if (canStepFrom(playerR, playerC, dir)) {
                  bufferedPlayerDir = dir;
                }
              } else if (attemptMove(dir)) {
                startCooldown(dir, now);
              }
            }
            if (fill) fill.style.transform = "scaleY(0)";
            btn.classList.remove("dpad-btn--cooling");
          } else {
            var p = (now - cooldownStart[dir]) / COOLDOWN_MS;
            if (p < 0) p = 0;
            if (p > 1) p = 1;
            if (fill) fill.style.transform = "scaleY(" + p + ")";
            btn.classList.add("dpad-btn--cooling");
          }
        });
        draw();
        requestAnimationFrame(tickGame);
      }

      document.querySelectorAll(".dpad-btn[data-dir]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          requestMove(btn.getAttribute("data-dir"));
        });
      });

      window.addEventListener("keydown", function (e) {
        var d = KEY_TO_DIR[e.key];
        if (!d) return;
        e.preventDefault();
        requestMove(d);
      });

      newMazeBtn.addEventListener("click", function () {
        newGame();
      });

      loseNewBtn.addEventListener("click", function () {
        newGame();
      });

      var resizeTimer;
      function onResize() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function () {
          layoutMaze();
          draw();
        }, 100);
      }

      window.addEventListener("resize", onResize);

      requestAnimationFrame(tickGame);
      newGame();
    })();
  </script>
</body>
</html>

      var rr = cellSize * 0.075 * ws;
      var wg = ctx.createLinearGradient(rx, ry, rx + bw, ry + bh);
      wg.addColorStop(0, "#e8c880");
      wg.addColorStop(0.35, "#c49848");
      wg.addColorStop(0.7, "#8b6040");
      wg.addColorStop(1, "#5a3420");
      ctx.fillStyle = wg;
      ctx.beginPath();
      ctx.moveTo(rx + rr, ry);
      ctx.lineTo(rx + bw - rr, ry);
      ctx.quadraticCurveTo(rx + bw, ry, rx + bw, ry + rr);
      ctx.lineTo(rx + bw, ry + bh - rr);
      ctx.quadraticCurveTo(rx + bw, ry + bh, rx + bw - rr, ry + bh);
      ctx.lineTo(rx + rr, ry + bh);
      ctx.quadraticCurveTo(rx, ry + bh, rx, ry + bh - rr);
      ctx.lineTo(rx, ry + rr);
      ctx.quadraticCurveTo(rx, ry, rx + rr, ry);
      ctx.closePath();
      ctx.fill();
      puStrokeStd(ctx, cellSize * ws, "#5a3420");
      ctx.strokeStyle = "rgba(60,30,10,0.4)";
      ctx.lineWidth = Math.max(1, cellSize * 0.03125 * ws);
      ctx.beginPath();
      ctx.moveTo(px, ry);
      ctx.lineTo(px, ry + bh);
      ctx.moveTo(rx, py);
      ctx.lineTo(rx + bw, py);
      ctx.stroke();
      var hg = ctx.createLinearGradient(rx, ry, rx, ry + bh * 0.35);
      hg.addColorStop(0, "rgba(255,255,255,0.35)");
      hg.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = hg;
      ctx.fillRect(rx + 1, ry + 1, bw - 2, bh * 0.35);
    },
    invuln: function (ctx, px, py, cellSize) {
      var ph = Math.max(3.6, cellSize * 0.162);
      var ig = ctx.createLinearGradient(px - ph, py - ph, px + ph, py + ph);
      ig.addColorStop(0, "#c0f0ff");
      ig.addColorStop(0.35, "#60d8f8");
      ig.addColorStop(0.7, "#20a0d0");
      ig.addColorStop(1, "#107090");
      ctx.fillStyle = ig;
      ctx.beginPath();
      ctx.moveTo(px, py - ph);
      ctx.lineTo(px + ph, py);
      ctx.lineTo(px, py + ph);
      ctx.lineTo(px - ph, py);
      ctx.closePath();
      ctx.fill();
      puStrokeStd(ctx, cellSize, "#20b0e0");
      var shg = ctx.createRadialGradient(
        px - ph * 0.25,
        py - ph * 0.3,
        ph * 0.05,
        px,
        py,
        ph * 0.7,
      );
      shg.addColorStop(0, "rgba(255,255,255,0.5)");
      shg.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = shg;
      ctx.beginPath();
      ctx.moveTo(px, py - ph);
      ctx.lineTo(px + ph, py);
      ctx.lineTo(px, py + ph);
      ctx.lineTo(px - ph, py);
      ctx.closePath();
      ctx.fill();
    },
    magnet: function (ctx, px, py, cellSize) {
      var mw = Math.max(10, cellSize * 0.28);
      var mh = Math.max(8, cellSize * 0.22);
      var legW = mw * 0.28;
      var arcR = mw * 0.5;
      var topY = py - mh * 0.5;
      var arcCy = py + mh * 0.08;
      ctx.strokeStyle = "rgba(0,0,0,0)";
      ctx.lineWidth = Math.max(1.5, cellSize * 0.04);
      ctx.fillStyle = "#d04040";
      ctx.beginPath();
      ctx.moveTo(px - arcR, topY);
      ctx.lineTo(px - arcR + legW, topY);
      ctx.lineTo(px - arcR + legW, arcCy);
      ctx.arc(px, arcCy, arcR - legW, Math.PI, 0, true);
      ctx.lineTo(px + arcR, topY);
      ctx.lineTo(px + arcR, topY);
      ctx.arc(px, arcCy, arcR, 0, Math.PI, false);
      ctx.closePath();
      ctx.fill();
      var mg = ctx.createLinearGradient(px - arcR, topY, px + arcR, topY);
      mg.addColorStop(0, "#e06060");
      mg.addColorStop(0.45, "#d04040");
      mg.addColorStop(0.55, "#3060d0");
      mg.addColorStop(1, "#4878e0");
      ctx.fillStyle = mg;
      ctx.fill();
      puStrokeStd(ctx, cellSize, "#802020");
      var tipH = mh * 0.22;
      ctx.fillStyle = "#c0c0c0";
      ctx.fillRect(px - arcR, topY, legW, tipH);
      ctx.fillRect(px + arcR - legW, topY, legW, tipH);
      puHighlight(ctx, px, py - mh * 0.15, mw * 0.35);
    },
    fear: function (ctx, px, py, cellSize) {
      var fr = Math.max(5, cellSize * 0.13);
      var fg = ctx.createRadialGradient(px - fr * 0.25, py - fr * 0.3, fr * 0.1, px, py, fr);
      fg.addColorStop(0, "#d88aff");
      fg.addColorStop(0.45, "#9040d0");
      fg.addColorStop(1, "#3a1060");
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.arc(px, py, fr, 0, Math.PI * 2);
      ctx.fill();
      puStrokeStd(ctx, cellSize, "#7030b0");
      puHighlight(ctx, px, py, fr);
      var eye = Math.max(1.5, cellSize * 0.035);
      ctx.fillStyle = "#1a0830";
      ctx.beginPath();
      ctx.arc(px - fr * 0.25, py - eye * 0.3, eye, 0, Math.PI * 2);
      ctx.arc(px + fr * 0.25, py - eye * 0.3, eye, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.15)";
      ctx.lineWidth = Math.max(1, cellSize * 0.02);
      ctx.beginPath();
      ctx.arc(px - fr * 0.25, py - eye * 0.3, eye * 0.5, -2.4, -0.8);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(px + fr * 0.25, py - eye * 0.3, eye * 0.5, -2.4, -0.8);
      ctx.stroke();
    },
    banish: function (ctx, px, py, cellSize) {
      var brad = Math.max(6, cellSize * 0.18);
      var bg = ctx.createRadialGradient(
        px - brad * 0.25,
        py - brad * 0.25,
        brad * 0.08,
        px,
        py,
        brad,
      );
      bg.addColorStop(0, "#b0b8c8");
      bg.addColorStop(0.5, "#6a7080");
      bg.addColorStop(1, "#2a2e38");
      ctx.fillStyle = bg;
      ctx.beginPath();
      ctx.arc(px, py, brad, 0, Math.PI * 2);
      ctx.fill();
      puStrokeStd(ctx, cellSize, "#cc4444");
      puHighlight(ctx, px, py, brad);
      var xw = Math.max(1.5, cellSize * 0.05);
      ctx.strokeStyle = "#ff6060";
      ctx.lineWidth = xw;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(px - brad * 0.42, py - brad * 0.42);
      ctx.lineTo(px + brad * 0.42, py + brad * 0.42);
      ctx.moveTo(px + brad * 0.42, py - brad * 0.42);
      ctx.lineTo(px - brad * 0.42, py + brad * 0.42);
      ctx.stroke();
      ctx.lineCap = "butt";
    },
    goldBurst: function (ctx, px, py, cellSize) {
      var gsz = cellSize * 0.52;
      var goy = cellSize * 0.12;
      var gox = cellSize * 0.14;
      drawGoldPickupDisc(ctx, px, py - goy, gsz);
      drawGoldPickupDisc(ctx, px - gox, py + goy * 0.75, gsz);
      drawGoldPickupDisc(ctx, px + gox, py + goy * 0.75, gsz);
    },
    phase: function (ctx, px, py, cellSize) {
      var prad = Math.max(7, cellSize * 0.2);
      var pg = ctx.createRadialGradient(
        px - prad * 0.2,
        py - prad * 0.25,
        prad * 0.05,
        px,
        py,
        prad,
      );
      pg.addColorStop(0, "rgba(200,255,255,0.4)");
      pg.addColorStop(0.5, "rgba(80,200,220,0.25)");
      pg.addColorStop(1, "rgba(40,100,120,0.1)");
      ctx.fillStyle = pg;
      ctx.beginPath();
      ctx.arc(px, py, prad, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(140,250,255,0.95)";
      ctx.lineWidth = Math.max(2, cellSize * 0.045);
      ctx.setLineDash([cellSize * 0.1, cellSize * 0.08]);
      ctx.beginPath();
      ctx.arc(px, py, prad, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      puHighlight(ctx, px, py, prad * 0.7);
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.strokeStyle = "rgba(140,250,255,0.6)";
      ctx.lineWidth = Math.max(1, cellSize * 0.025);
      ctx.setLineDash([cellSize * 0.06, cellSize * 0.06]);
      ctx.beginPath();
      ctx.arc(px, py, prad * 0.6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    },
    stunNova: function (ctx, px, py, cellSize) {
      var snR = Math.max(8, cellSize * 0.22);
      var spi;
      var sg = ctx.createRadialGradient(
        px - snR * 0.15,
        py - snR * 0.2,
        snR * 0.05,
        px,
        py,
        snR * 0.55,
      );
      sg.addColorStop(0, "#fffce0");
      sg.addColorStop(0.35, "#f8e040");
      sg.addColorStop(1, "#c09020");
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.arc(px, py, snR * 0.55, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#d8b030";
      ctx.lineWidth = Math.max(1, cellSize * 0.035);
      ctx.stroke();
      puHighlight(ctx, px, py, snR * 0.5);
      ctx.lineWidth = Math.max(1.5, cellSize * 0.04);
      for (spi = 0; spi < 8; spi++) {
        var ang = (spi / 8) * Math.PI * 2 - Math.PI / 2;
        var cs = Math.cos(ang);
        var sn = Math.sin(ang);
        var rg = ctx.createLinearGradient(
          px + cs * snR * 0.45,
          py + sn * snR * 0.45,
          px + cs * snR,
          py + sn * snR,
        );
        rg.addColorStop(0, "rgba(248,224,64,0.8)");
        rg.addColorStop(1, "rgba(248,224,64,0)");

        ctx.beginPath();
        ctx.moveTo(px + cs * snR * 0.45, py + sn * snR * 0.45);
        ctx.lineTo(px + cs * snR, py + sn * snR);

    },
  };

  function appendTileCenterSegs(pathVerts, maxTileEdges, outSegs) {
    var maxE = Math.min(maxTileEdges, Math.max(0, pathVerts.length - 1));
    var fi;
    for (fi = 0; fi < maxE; fi++) {
      var v0 = pathVerts[fi];
      var v1 = pathVerts[fi + 1];
      outSegs.push({
        x0: offsetX + v0.c * cellSize + cellSize / 2,
        y0: offsetY + v0.r * cellSize + cellSize / 2,
        x1: offsetX + v1.c * cellSize + cellSize / 2,
        y1: offsetY + v1.r * cellSize + cellSize / 2,
      });
    }
  }

  function drawMazeWalls() {
    ctx.strokeStyle = "#6e6e6e";
    ctx.lineWidth = 2;
    ctx.lineCap = "square";

    var r;
    var c;
    for (r = 0; r < rows; r++) {
      for (c = 0; c < cols; c++) {
        var x = offsetX + c * cellSize;
        var y = offsetY + r * cellSize;
        var w = grid[r][c];
        ctx.beginPath();
        if (w & N) {
          ctx.moveTo(x, y);
          ctx.lineTo(x + cellSize, y);
        }
        if (w & W) {
          ctx.moveTo(x, y);
          ctx.lineTo(x, y + cellSize);
        }
        if (c === cols - 1 && w & E) {
          ctx.moveTo(x + cellSize, y);
          ctx.lineTo(x + cellSize, y + cellSize);
        }
        if (r === rows - 1 && w & S) {
          ctx.moveTo(x, y + cellSize);
          ctx.lineTo(x + cellSize, y + cellSize);
        }
        ctx.stroke();
      }
    }
  }

  function drawExitGlow() {
    var gx = offsetX + (cols - 1) * cellSize + cellSize / 2;
    var gy = offsetY + (rows - 1) * cellSize + cellSize / 2;
    var exitEmojiPx = cellSize * 0.68 * EMOJI_VISUAL_SCALE * 0.8;
    drawCanvasEmoji(ctx, EMOJI_EXIT_LADDER, gx, gy, exitEmojiPx, EMOJI_TINT_PLAYER);
  }

  function drawPendingCoinPickups() {
    pendingCoinKeys.forEach(function (key) {
      var comma = key.indexOf(",");
      var cr = parseInt(key.slice(0, comma), 10);
      var cc = parseInt(key.slice(comma + 1), 10);
      var cx = offsetX + cc * cellSize + cellSize / 2;
      var cy = offsetY + cr * cellSize + cellSize / 2;
      drawGoldPickupDisc(ctx, cx, cy, cellSize);
    });
  }

  function drawCoinPullAnimations(nowGoldFx) {
    var pai;
    for (pai = 0; pai < coinPullAnimations.length; pai++) {
      var ap = coinPullAnimations[pai];
      var tRaw = clamp01((nowGoldFx - ap.startMs) / ap.durationMs);
      var te = 1 - Math.pow(1 - tRaw, 3);
      var ex = offsetX + ap.ec * cellSize + cellSize / 2;
      var ey = offsetY + ap.er * cellSize + cellSize / 2;
      if (ap.absorbPlayer) {
        var plEnd = getPlayerPixelPos(nowGoldFx);
        ex = plEnd.x;
        ey = plEnd.y;
      }
      var sx;
      var sy;
      if (ap.spreadFromPlayer) {
        var plStart = getPlayerPixelPos(nowGoldFx);
        sx = plStart.x;
        sy = plStart.y;
      } else {
        sx = offsetX + ap.sc * cellSize + cellSize / 2;
        sy = offsetY + ap.sr * cellSize + cellSize / 2;
      }
      var ix = sx + (ex - sx) * te;
      var iy = sy + (ey - sy) * te;
      if (ap.absorbPlayer && tRaw > 0.62) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, 1 - (tRaw - 0.62) / 0.38);
      }
      drawGoldPickupDisc(ctx, ix, iy, cellSize);
      if (ap.absorbPlayer && tRaw > 0.62) {
        ctx.restore();
      }
    }
  }

  function drawPendingLevelPowerups() {
    var ppi;
    for (ppi = 0; ppi < pendingLevelPowerups.length; ppi++) {
      var pup = pendingLevelPowerups[ppi];
      var px = offsetX + pup.c * cellSize + cellSize / 2;
      var py = offsetY + pup.r * cellSize + cellSize / 2;
      var drawPu = POWERUP_DRAW[pup.type];
      if (drawPu) {
        ctx.save();
        ctx.translate(px, py);
        ctx.scale(POWERUP_MAZE_VISUAL_SCALE, POWERUP_MAZE_VISUAL_SCALE);
        ctx.translate(-px, -py);
        drawPu(ctx, px, py, cellSize);
        ctx.restore();
      }
    }
  }

  function stunShakePixelOffset(nowMs) {
    var w = cellSize * 0.03;
    var t = nowMs * 0.021;
    return {
      x: Math.sin(t * 6.8) * w,
      y: Math.sin(t * 10.4 + 0.9) * w,
    };
  }

  function cooldownPickupShakeOffset(nowMs) {
    var fi;
    var bestFall = 0;
    var phaseBase = 0;
    for (fi = 0; fi < playerPickupFlashes.length; fi++) {
      var fl = playerPickupFlashes[fi];
      if (fl.type !== "cooldown") {
        continue;
      }
      var elapsed = nowMs - fl.startMs;
      if (elapsed < 0 || elapsed >= FLASH_DURATION_MS) {
        continue;
      }
      var u = elapsed / FLASH_DURATION_MS;
      var fall = (1 - u) * (1 - u);
      if (fall > bestFall) {
        bestFall = fall;
        phaseBase = fl.startMs;
      }
    }
    if (bestFall <= 0) {
      return { x: 0, y: 0 };
    }
    var w = cellSize * 0.055 * bestFall;
    var te = (nowMs - phaseBase) * 0.042;
    return {
      x: Math.sin(te * 14.5) * w,
      y: Math.sin(te * 19.2 + 0.9) * w,
    };
  }

  function drawActiveGameLayer(nowDraw) {
    if (!gameActive()) {
      return;
    }
    var mpos = getMonsterPixelPos(nowDraw);
    var mx = mpos.x;
    var my = mpos.y;
    var monHitR = monsterEffectiveHitRadius(nowDraw);
    var hidePreviewRSq = monHitR * monHitR;

    var previewSegs = [];
    var PREVIEW_MAX_TILE_EDGES = 4;
    var enemyFearedPreview = nowDraw < fearUntilMs;
    if (monsterGlideActive) {
      var glideEnd = tileCenterPixel(monsterGlideTc, monsterGlideTr);
      previewSegs.push({
        x0: mpos.x,
        y0: mpos.y,
        x1: glideEnd.x,
        y1: glideEnd.y,
      });
      var tail = enemyFearedPreview
        ? getMonsterFleePreviewPath(monsterGlideTr, monsterGlideTc, PREVIEW_MAX_TILE_EDGES)
        : buildMonsterChasePreviewPath(monsterGlideTr, monsterGlideTc);
      appendTileCenterSegs(tail, PREVIEW_MAX_TILE_EDGES, previewSegs);
    } else {
      var fullM = enemyFearedPreview
        ? getMonsterFleePreviewPath(monsterR, monsterC, PREVIEW_MAX_TILE_EDGES)
        : buildMonsterChasePreviewPath(monsterR, monsterC);
      if (fullM.length >= 2) {
        appendTileCenterSegs(fullM, PREVIEW_MAX_TILE_EDGES, previewSegs);
      }
    }
    strokeRedPreviewLine(ctx, previewSegs, mx, my, hidePreviewRSq);

    var mix;
    for (mix = 0; mix < spawnedEnemies.length; mix++) {
      var mPv = spawnedEnemies[mix];
      if (mPv.kind !== "minion") {
        continue;
      }
      var minionSegs = buildMinionPreviewSegs(mPv, nowDraw);
      var mnh = getMinionPixelPos(mPv, nowDraw);
      strokeRedPreviewLine(ctx, minionSegs, mnh.x, mnh.y, hidePreviewRSq);
    }

    var oniX = mx;
    var oniY = my;
    if (nowDraw < monsterStunnedUntilMs) {
      var oniSh = stunShakePixelOffset(nowDraw);
      oniX += oniSh.x;
      oniY += oniSh.y;
    }
    drawCanvasEmoji(
      ctx,
      EMOJI_ONI,
      oniX,
      oniY,
      monHitR * 2.45 * EMOJI_VISUAL_SCALE,
      EMOJI_TINT_ENEMY,
    );

    var ex;
    for (ex = 0; ex < spawnedEnemies.length; ex++) {
      var spawnEnt = spawnedEnemies[ex];
      if (spawnEnt.kind === "egg") {
        var grow = clamp01((nowDraw - spawnEnt.spawnMs) / EGG_HATCH_MS);
        var eggCen = tileCenterPixel(spawnEnt.cellC, spawnEnt.cellR);
        var eggFont = cellSize * 0.64 * EMOJI_VISUAL_SCALE * grow;
        var eggX = eggCen.x;
        var eggY = eggCen.y;
        if (spawnEnt.stunnedUntilMs && nowDraw < spawnEnt.stunnedUntilMs) {
          var eggSh = stunShakePixelOffset(nowDraw + spawnEnt.cellR * 41 + spawnEnt.cellC * 17);
          eggX += eggSh.x;
          eggY += eggSh.y;
        }
        var eggFlash =
          0.38 +
          0.62 *
            (0.5 +
              0.5 *
                Math.sin(
                  nowDraw * 0.0125 + spawnEnt.cellR * 1.31 + spawnEnt.cellC * 2.07,
                ));
        ctx.save();
        ctx.globalAlpha = eggFlash;
        drawCanvasEmoji(ctx, EMOJI_MINION, eggX, eggY, eggFont, EMOJI_TINT_EGG);
        ctx.restore();
      }
    }
    for (ex = 0; ex < spawnedEnemies.length; ex++) {
      var mn = spawnedEnemies[ex];
      if (mn.kind !== "minion") {
        continue;
      }
      var mnp = getMinionPixelPos(mn, nowDraw);
      var minX = mnp.x;
      var minY = mnp.y;
      if (nowDraw < mn.stunnedUntilMs) {
        var minSh = stunShakePixelOffset(nowDraw + mn.r * 47 + mn.c * 31);
        minX += minSh.x;
        minY += minSh.y;
      }
      drawCanvasEmoji(
        ctx,
        EMOJI_MINION,
        minX,
        minY,
        cellSize * 0.64 * EMOJI_VISUAL_SCALE,
        EMOJI_TINT_ENEMY,
      );
    }
    drawBanishImpRings(nowDraw);
  }

  function drawBanishImpRings(nowMs) {
    var ri;
    for (ri = banishImpRings.length - 1; ri >= 0; ri--) {
      var ring = banishImpRings[ri];
      var elapsed = nowMs - ring.startMs;
      if (elapsed >= BANISH_IMP_RING_MS) {
        banishImpRings.splice(ri, 1);
        continue;
      }
      var t = elapsed / BANISH_IMP_RING_MS;
      var fade = (1 - t) * (1 - t);
      var alpha = fade * 0.88;
      var radius = cellSize * (0.1 + t * 1.05);
      ctx.save();
      ctx.lineCap = "round";
      ctx.strokeStyle = "rgba(235,45,55," + (alpha * 0.95).toFixed(3) + ")";
      ctx.lineWidth = Math.max(5, cellSize * 0.12) * (1 - t * 0.4);
      ctx.beginPath();
      ctx.arc(ring.x, ring.y, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = "rgba(255,140,130," + (alpha * 0.42).toFixed(3) + ")";
      ctx.lineWidth = Math.max(2.5, cellSize * 0.055) * (1 - t * 0.3);
      ctx.beginPath();
      ctx.arc(ring.x, ring.y, Math.max(0, radius - cellSize * 0.07), 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawInvulnAura(px, py, now) {
    if (now >= invulnerableUntilMs) {
      return;
    }
    var r = cellSize * 0.38 * 1.1 * 1.2;
    var breathe = 1.0 + 0.1 * Math.sin(now * 0.005);
    var sr = r * breathe;
    var pulseA = 0.35 + 0.2 * Math.sin(now * 0.004);
    var remain = invulnerableUntilMs - now;
    var flashMul =
      remain <= INVULN_WARN_FLASH_MS ? 0.32 + 0.68 * (0.5 + 0.5 * Math.sin(now * 0.03)) : 1;
    var strokeAlpha = Math.min(1, pulseA * flashMul);
    var fillAlpha = Math.min(1, 0.12 * flashMul);
    ctx.save();
    ctx.strokeStyle = "rgba(80,220,255," + strokeAlpha.toFixed(3) + ")";
    ctx.lineWidth = Math.max(2.925, cellSize * 0.078);
    ctx.beginPath();
    ctx.moveTo(px, py - sr);
    ctx.lineTo(px + sr, py);
    ctx.lineTo(px, py + sr);
    ctx.lineTo(px - sr, py);
    ctx.closePath();
    ctx.stroke();
    var grd = ctx.createRadialGradient(px, py, sr * 0.2, px, py, sr);
    grd.addColorStop(0, "rgba(80,220,255," + fillAlpha.toFixed(4) + ")");
    grd.addColorStop(1, "rgba(80,220,255,0)");
    ctx.fillStyle = grd;
    ctx.fill();
    ctx.restore();
  }

  function phaseEffectBlinkAlpha(now) {
    var rem = phaseUntilMs - now;
    if (rem <= 0 || rem > PHASE_WARN_BLINK_MS) {
      return 1;
    }
    return 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(now * 0.015));
  }

  function drawPhaseAura(px, py, now) {
    if (now >= phaseUntilMs) {
      return;
    }
    var blink = phaseEffectBlinkAlpha(now);
    var r = cellSize * 0.42;
    var rot = (now * 0.002) % (Math.PI * 2);
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(rot);
    ctx.strokeStyle = "rgba(140,250,255," + (0.45 * blink).toFixed(3) + ")";
    ctx.lineWidth = Math.max(1.5, cellSize * 0.035);
    ctx.setLineDash([cellSize * 0.12, cellSize * 0.1]);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  function drawWallBreakChargeAura(px, py, now) {
    if (wallBreakCharges < 1) {
      return;
    }
    var r = cellSize * 0.44;
    var breathe = 1 + 0.05 * Math.sin(now * 0.0038);
    var sr = r * breathe;
    ctx.save();
    var fillG = ctx.createRadialGradient(px, py, sr * 0.55, px, py, sr);
    fillG.addColorStop(0, "rgba(232,200,128,0.2)");
    fillG.addColorStop(0.5, "rgba(196,152,72,0.1)");
    fillG.addColorStop(1, "rgba(139,96,64,0)");
    ctx.fillStyle = fillG;
    ctx.beginPath();
    ctx.arc(px, py, sr, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#c49848";
    ctx.lineWidth = Math.max(2, cellSize * 0.038) * 1.4;
    ctx.beginPath();
    ctx.arc(px, py, sr, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = "#5a3420";
    ctx.lineWidth = Math.max(1, cellSize * 0.022) * 1.4;
    ctx.beginPath();
    ctx.arc(px, py, sr - cellSize * 0.012, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function drawMagnetAura(px, py, now) {
    if (now >= magnetUntilMs) {
      return;
    }
    var r = cellSize * 0.48;
    var dotCount = 4;
    var baseAngle = now * 0.003;
    var dotR = Math.max(2, cellSize * 0.06);
    var mi;
    for (mi = 0; mi < dotCount; mi++) {
      var ang = baseAngle + (mi / dotCount) * Math.PI * 2;
      var dx = px + Math.cos(ang) * r;
      var dy = py + Math.sin(ang) * r;
      var grd = ctx.createRadialGradient(
        dx - dotR * 0.3,
        dy - dotR * 0.3,
        dotR * 0.1,
        dx,
        dy,
        dotR,
      );
      grd.addColorStop(0, "#fff4a8");
      grd.addColorStop(0.5, "#e8c030");
      grd.addColorStop(1, "#a67c10");
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(dx, dy, dotR, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawFearAura(px, py, now) {
    if (now >= fearUntilMs) {
      return;
    }
    var r = cellSize * 0.44;
    var rot = -(now * 0.0015) % (Math.PI * 2);
    var alpha = 0.25 + 0.15 * Math.sin(now * 0.006);
    var arcCount = 3;
    var arcLen = Math.PI * 0.45;
    ctx.save();
    ctx.strokeStyle = "rgba(160,60,240," + alpha.toFixed(2) + ")";
    ctx.lineWidth = Math.max(2, cellSize * 0.055);
    ctx.lineCap = "round";
    var ai;
    for (ai = 0; ai < arcCount; ai++) {
      var start = rot + (ai / arcCount) * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(px, py, r, start, start + arcLen);
      ctx.stroke();
    }
    ctx.lineCap = "butt";
    ctx.restore();
  }

  function drawFearPickupWave(px, py, now) {
    if (fearPickupWaveStartMs <= 0) {
      return;
    }
    var elapsed = now - fearPickupWaveStartMs;
    if (elapsed < 0 || elapsed >= FEAR_DURATION_MS) {
      return;
    }
    var t = elapsed / FEAR_DURATION_MS;
    var radius = cellSize * (0.2 + t * 1.08) * 3;
    var fade = (1 - t) * (1 - t);
    var alpha = fade * 0.55;
    ctx.save();
    var g = ctx.createRadialGradient(px, py, 0, px, py, radius);
    g.addColorStop(0, "rgba(235,145,255," + (alpha * 0.45).toFixed(3) + ")");
    g.addColorStop(0.38, "rgba(185,80,235," + (alpha * 0.32).toFixed(3) + ")");
    g.addColorStop(0.7, "rgba(135,55,200," + (alpha * 0.24).toFixed(3) + ")");
    g.addColorStop(1, "rgba(115,45,175," + (alpha * 0.16).toFixed(3) + ")");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(px, py, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(210,110,250," + (alpha * 0.35).toFixed(3) + ")";
    ctx.lineWidth = Math.max(1.5, cellSize * 0.04) * (1 - t * 0.35);
    ctx.beginPath();
    ctx.arc(px, py, radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  var FLASH_DRAW = {
    wall: function (ctx, px, py, t) {
      var alpha = 1 - t;
      var spread = cellSize * 0.15 + t * cellSize * 0.3;
      ctx.save();
      ctx.globalAlpha = alpha * 0.7;
      ctx.strokeStyle = "#c09050";
      ctx.lineWidth = Math.max(1.5, cellSize * 0.04);
      ctx.lineCap = "round";
      var wi;
      for (wi = 0; wi < 6; wi++) {
        var wa = (wi / 6) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(px + Math.cos(wa) * spread * 0.3, py + Math.sin(wa) * spread * 0.3);
        ctx.lineTo(px + Math.cos(wa) * spread, py + Math.sin(wa) * spread);
        ctx.stroke();
      }
      ctx.lineCap = "butt";
      ctx.restore();
    },
    banish: function (ctx, px, py, t) {
      var scale = 0.4 + t * 0.8;
      var alpha = 1 - t;
      var arm = cellSize * 0.22 * scale;
      ctx.save();
      ctx.globalAlpha = alpha * 0.75;
      ctx.strokeStyle = "#ff5050";
      ctx.lineWidth = Math.max(2, cellSize * 0.06);
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(px - arm, py - arm);
      ctx.lineTo(px + arm, py + arm);
      ctx.moveTo(px + arm, py - arm);
      ctx.lineTo(px - arm, py + arm);
      ctx.stroke();
      ctx.lineCap = "butt";
      ctx.restore();
    },
    goldBurst: function (ctx, px, py, t) {
      var alpha = 1 - t;
      var dist = cellSize * (0.1 + t * 0.35);
      var dotR = Math.max(1.5, cellSize * 0.04) * (1 - t * 0.5);
      ctx.save();
      ctx.globalAlpha = alpha * 0.7;
      var gi;
      for (gi = 0; gi < 8; gi++) {
        var ga = (gi / 8) * Math.PI * 2 - Math.PI / 2;
        var gx = px + Math.cos(ga) * dist;
        var gy = py + Math.sin(ga) * dist;
        ctx.fillStyle = "#f0d040";
        ctx.beginPath();
        ctx.arc(gx, gy, dotR, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    },
    stunNova: function (ctx, px, py, t) {
      var alpha = (1 - t) * 0.6;
      var r = cellSize * (0.2 + t * 0.5) * 1.3 * 1.3 * 1.4;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = "#f8e040";
      ctx.lineWidth = Math.max(2, cellSize * 0.05) * (1 - t * 0.5) * 1.3 * 1.4;
      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    },
  };

  function drawPickupFlashes(px, py, now) {
    var fi = playerPickupFlashes.length - 1;
    while (fi >= 0) {
      var fl = playerPickupFlashes[fi];
      var elapsed = now - fl.startMs;
      if (elapsed >= FLASH_DURATION_MS) {
        playerPickupFlashes.splice(fi, 1);
        fi--;
        continue;
      }
      var t = clamp01(elapsed / FLASH_DURATION_MS);
      var fn = FLASH_DRAW[fl.type];
      if (fn) {
        fn(ctx, px, py, t);
      }
      fi--;
    }
  }

  function drawPlayerAvatar(nowDraw) {
    var ppos = getPlayerPixelPos(nowDraw);
    var cdSh = cooldownPickupShakeOffset(nowDraw);
    var px = ppos.x + cdSh.x;
    var py = ppos.y + cdSh.y;

    drawInvulnAura(px, py, nowDraw);
    drawPhaseAura(px, py, nowDraw);
    drawWallBreakChargeAura(px, py, nowDraw);

    if (nowDraw < phaseUntilMs) {
      ctx.save();
      ctx.globalAlpha = 0.62 * phaseEffectBlinkAlpha(nowDraw);
    }
    drawCanvasEmoji(
      ctx,
      EMOJI_PLAYER_KNIGHT,
      px,
      py,
      cellSize * 0.68 * EMOJI_VISUAL_SCALE,
      EMOJI_TINT_PLAYER,
    );
    if (nowDraw < phaseUntilMs) {
      ctx.restore();
    }

    drawMagnetAura(px, py, nowDraw);
    drawFearAura(px, py, nowDraw);
    drawFearPickupWave(px, py, nowDraw);
    drawPickupFlashes(px, py, nowDraw);
  }

  function draw() {
    syncCanvasBackingStore();
    var cw = canvas.clientWidth;
    var ch = canvas.clientHeight;
    if (cw < 1 || ch < 1) {
      return;
    }
    ctx.fillStyle = "#000000";
    ctx.fillRect(0, 0, cw, ch);

    drawMazeWalls();
    drawExitGlow();
    drawPendingCoinPickups();
    var nowDraw = performance.now();
    drawCoinPullAnimations(nowDraw);
    drawPendingLevelPowerups();
    drawActiveGameLayer(nowDraw);
    drawPlayerAvatar(nowDraw);
  }

  var DIRS = ["north", "south", "east", "west"];
  var dpadRoot = document.getElementById("dpadRoot");
  var dpadCooldownFillGlobal = dpadRoot
    ? dpadRoot.querySelector(".dpad-cooldown-fill-global")
    : null;
  var QUEUE_WINDOW_MAX_MS = 200;
  var moveCooldownStart = 0;
  var moveCooldownEnd = 0;
  var queuedMoveDir = null;

  function clearMoveQueue() {
    queuedMoveDir = null;
  }

  var KEY_TO_DIR = {
    ArrowUp: "north",
    ArrowDown: "south",
    ArrowLeft: "west",
    ArrowRight: "east",
  };

  function canStepFrom(r, c, dir, nowMs) {
    var d = DIR_MOVE[dir];
    if (!d) {
      return false;
    }
    var stepNow = nowMs !== undefined ? nowMs : performance.now();
    var nr = r + d.dr;
    var nc = c + d.dc;
    if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) {
      return false;
    }
    if (stepNow < phaseUntilMs) {
      return true;
    }
    return !(grid[r][c] & d.m);
  }

  function attemptMove(dir) {
    if (!gameActive()) return false;
    if (playerGlideActive) return false;

    var moveNow = performance.now();
    if (!canStepFrom(playerR, playerC, dir, moveNow)) {
      var nb = neighborCell(playerR, playerC, dir);
      if (nb.r < 0 || nb.r >= rows || nb.c < 0 || nb.c >= cols) {
        return false;
      }
      if (wallBreakCharges <= 0) {
        return false;
      }
      if (!tryOpenInternalWallForPlayer(playerR, playerC, dir)) {
        return false;
      }
      wallBreakCharges--;
    }

    var dm = DIR_MOVE[dir];
    var nr = playerR + (dm ? dm.dr : 0);
    var nc = playerC + (dm ? dm.dc : 0);

    var oldPr = playerR;
    var oldPc = playerC;
    playerR = nr;
    playerC = nc;

    var pfr;
    var pfc;
    if (playerGlideActive) {
      var pRawU = clamp01((moveNow - playerGlideStartMs) / PLAYER_GLIDE_MS);
      var pSmooth = pRawU * pRawU * (3 - 2 * pRawU);
      pfr = playerGlideFr + (playerGlideTr - playerGlideFr) * pSmooth;
      pfc = playerGlideFc + (playerGlideTc - playerGlideFc) * pSmooth;
    } else {
      pfr = oldPr;
      pfc = oldPc;
    }
    playerGlideFr = pfr;
    playerGlideFc = pfc;
    playerGlideTr = playerR;
    playerGlideTc = playerC;
    playerGlideStartMs = moveNow;
    playerGlideActive = true;

    if (hitboxesOverlap(moveNow)) {
      triggerLose();
      return true;
    }
    return true;
  }

  function startMoveCooldown(now) {
    moveCooldownStart = now;
    moveCooldownEnd = now + effectiveCooldownMs();
  }

  function resetCooldowns() {
    moveCooldownStart = 0;
    moveCooldownEnd = 0;
    clearMoveQueue();
    if (dpadRoot) dpadRoot.classList.remove("dpad--cooling");
    if (dpadCooldownFillGlobal) {
      dpadCooldownFillGlobal.style.transform = "scaleY(0)";
    }
  }

  function tickMonster(now, dt) {
    if (!gameActive()) return;
    if (now < monsterGrowStartMs + MONSTER_GROW_MS) {
      return;
    }
    if (now < monsterStunnedUntilMs) {
      if (monsterGlideActive && dt > 0) {
        monsterGlideStartMs += dt;
      }
      return;
    }
    var guard = 0;
    while (guard < 32) {
      guard++;
      if (monsterGlideActive) {
        if (now < monsterGlideStartMs + MONSTER_TILE_MS) {
          return;
        }
        monsterR = monsterGlideTr;
        monsterC = monsterGlideTc;
        monsterGlideActive = false;
        if (hitboxesOverlap(now)) {
          triggerLose();
          return;
        }
        continue;
      }
      if (now < fearUntilMs) {
        monsterChaseQueue.length = 0;
        var fd = fullBfsDistFromPlayer();
        var fleeN = pickMonsterFleeStep(monsterR, monsterC, fd);
        if (!fleeN) {
          if (hitboxesOverlap(now)) {
            triggerLose();
          }
          return;
        }
        var pathF = [{ r: monsterR, c: monsterC }, fleeN];
        if (pathF.length < 2) {
          if (hitboxesOverlap(now)) {
            triggerLose();
          }
          return;
        }
        monsterGlideFr = monsterR;
        monsterGlideFc = monsterC;
        monsterGlideTr = pathF[1].r;
        monsterGlideTc = pathF[1].c;
        monsterGlideStartMs = now;
        monsterGlideActive = true;
        return;
      }
      if (monsterChaseQueue.length === 0) {
        var pathC = shortestPath(monsterR, monsterC, playerR, playerC);
        if (pathC.length < 2) {
          if (hitboxesOverlap(now)) {
            triggerLose();
          }
          return;
        }
        var maxCommit = Math.min(2, pathC.length - 1);
        var pci;
        for (pci = 1; pci <= maxCommit; pci++) {
          monsterChaseQueue.push({ r: pathC[pci].r, c: pathC[pci].c });
        }
      }
      var nextChase = monsterChaseQueue[0];
      if (!monsterAdjacentStepValid(monsterR, monsterC, nextChase.r, nextChase.c)) {
        monsterChaseQueue.length = 0;
        continue;
      }
      monsterChaseQueue.shift();
      monsterGlideFr = monsterR;
      monsterGlideFc = monsterC;
      monsterGlideTr = nextChase.r;
      monsterGlideTc = nextChase.c;
      monsterGlideStartMs = now;
      monsterGlideActive = true;
      return;
    }
  }

  function tickEggDropsAndHatch(now, dt) {
    if (!gameActive()) {
      return;
    }
    if (now >= nextEggDropAt) {
      var mp = getMonsterPixelPos(now);
      var cell = pixelCellFromPixel(mp.x, mp.y);
      spawnedEnemies.push({
        kind: "egg",
        hurtsPlayer: false,
        spawnMs: now,
        cellR: cell.r,
        cellC: cell.c,
      });
      do {
        nextEggDropAt += consumeNextEggDropGapMs();
      } while (nextEggDropAt <= now);
    }
    var hi;
    for (hi = spawnedEnemies.length - 1; hi >= 0; hi--) {
      var ent = spawnedEnemies[hi];
      if (ent.kind === "egg") {
        if (ent.stunnedUntilMs && now < ent.stunnedUntilMs) {
          if (dt > 0) {
            ent.spawnMs += dt;
          }
          continue;
        }
        if (now >= ent.spawnMs + EGG_HATCH_MS) {
          spawnedEnemies[hi] = {
            kind: "minion",
            r: ent.cellR,
            c: ent.cellC,
            fromR: -1,
            fromC: -1,
            plannedCells: [],
            glideActive: false,
            fr: ent.cellR,
            fc: ent.cellC,
            tr: ent.cellR,
            tc: ent.cellC,
            stunnedUntilMs: 0,
          };
          if (pendingBanishImpCount > 0) {
            pendingBanishImpCount--;
            banishMinionAtIndex(now, hi);
          }
        }
      }
    }
  }

  function tickMinions(now, dt) {
    if (!gameActive()) {
      return;
    }
    var mi;
    for (mi = 0; mi < spawnedEnemies.length; mi++) {
      var m = spawnedEnemies[mi];
      if (m.kind !== "minion") {
        continue;
      }
      if (now < m.stunnedUntilMs) {
        if (m.glideActive && dt > 0) {
          m.glideStartMs += dt;
        }
        continue;
      }
      var guard = 0;
      while (guard < 32) {
        guard++;
        if (m.glideActive) {
          if (now < m.glideStartMs + MONSTER_TILE_MS) {
            break;
          }
          m.fromR = m.fr;
          m.fromC = m.fc;
          m.r = m.tr;
          m.c = m.tc;
          m.glideActive = false;
          if (m.plannedCells.length && m.plannedCells[0].r === m.r && m.plannedCells[0].c === m.c) {
            m.plannedCells.shift();
          } else {
            m.plannedCells = [];
          }
          replenishMinionPlannedPath(m, MIN_MINION_PLAN_LEN, now);
          if (hitboxesOverlap(now)) {
            triggerLose();
            return;
          }
          continue;
        }
        replenishMinionPlannedPath(m, MIN_MINION_PLAN_LEN, now);
        if (!m.plannedCells.length) {
          break;
        }
        var tgt = m.plannedCells[0];
        if (!minionPlanTargetValid(m.r, m.c, m.fromR, m.fromC, tgt.r, tgt.c)) {
          m.plannedCells = [];
          continue;
        }
        m.fr = m.r;
        m.fc = m.c;
        m.tr = tgt.r;
        m.tc = tgt.c;
        m.glideStartMs = now;
        m.glideActive = true;
        break;
      }
    }
  }

  function requestMove(dir) {
    if (!gameActive()) return;
    var now = performance.now();
    if (playerGlideActive) {
      if (canBufferDir(dir)) {
        bufferedPlayerDir = dir;
      }
      return;
    }
    if (now >= moveCooldownEnd) {
      if (attemptMove(dir)) {
        startMoveCooldown(now);
        clearMoveQueue();
      }
      return;
    }
    var left = moveCooldownEnd - now;
    var cdDurQueue = moveCooldownEnd - moveCooldownStart;
    if (cdDurQueue < 1) {
      cdDurQueue = 1;
    }
    var qWin = Math.min(QUEUE_WINDOW_MAX_MS, cdDurQueue);
    if (left <= qWin && left > 0) {
      queuedMoveDir = dir;
    }
  }

  function tickGame() {
    var now = performance.now();
    var dt = lastGameTickMs > 0 ? now - lastGameTickMs : 0;
    lastGameTickMs = now;
    tickMonster(now, dt);
    tickEggDropsAndHatch(now, dt);
    tickMinions(now, dt);
    applyMagnetGoldPull(now);
    if (gameActive() && hitboxesOverlap(now)) {
      triggerLose();
    }
    if (playerGlideActive && now >= playerGlideStartMs + PLAYER_GLIDE_MS) {
      playerGlideActive = false;
      onPlayerArrivedOnTile(now);
      if (bufferedPlayerDir !== null && gameActive()) {
        var nextDir = bufferedPlayerDir;
        bufferedPlayerDir = null;
        if (now >= moveCooldownEnd) {
          if (attemptMove(nextDir)) {
            startMoveCooldown(now);
            clearMoveQueue();
          }
        } else {
          queuedMoveDir = nextDir;
        }
      }
    }
    if (now >= moveCooldownEnd) {
      if (queuedMoveDir !== null && gameActive()) {
        var qDir = queuedMoveDir;
        clearMoveQueue();
        if (playerGlideActive) {
          if (canBufferDir(qDir)) {
            bufferedPlayerDir = qDir;
          }
        } else if (attemptMove(qDir)) {
          startMoveCooldown(now);
        }
      }
    }
    var cdDurAll = moveCooldownEnd - moveCooldownStart;
    if (cdDurAll < 1) {
      cdDurAll = 1;
    }
    var pAll = clamp01(now >= moveCooldownEnd ? 0 : (now - moveCooldownStart) / cdDurAll);
    if (dpadRoot && dpadCooldownFillGlobal) {
      if (now >= moveCooldownEnd) {
        dpadCooldownFillGlobal.style.transform = "scaleY(0)";
        dpadRoot.classList.remove("dpad--cooling");
      } else {
        dpadCooldownFillGlobal.style.transform = "scaleY(" + pAll + ")";
        dpadRoot.classList.add("dpad--cooling");
      }
    }
    draw();
    requestAnimationFrame(tickGame);
  }

  function bindInstantActivate(el, handler) {
    if (!el) {
      return;
    }
    el.addEventListener("pointerdown", function (e) {
      if (el.disabled) {
        return;
      }
      if (e.pointerType === "mouse" && e.button !== 0) {
        return;
      }
      e.preventDefault();
      handler(e);
    });
    el.addEventListener("keydown", function (e) {
      if (el.disabled) {
        return;
      }
      if (e.key !== "Enter" && e.key !== " ") {
        return;
      }
      if (e.repeat) {
        return;
      }
      e.preventDefault();
      handler(e);
    });
  }

  document.querySelectorAll(".dpad-btn[data-dir]").forEach(function (btn) {
    bindInstantActivate(btn, function () {
      requestMove(btn.getAttribute("data-dir"));
    });
  });

  window.addEventListener("keydown", function (e) {
    var d = KEY_TO_DIR[e.key];
    if (!d) return;
    e.preventDefault();
    requestMove(d);
  });

  bindInstantActivate(newMazeBtn, function () {
    startRun();
  });

  bindInstantActivate(loseNewBtn, function () {
    resetRun();
  });

  function tryShopPurchaseFromButton(btn) {
    if (!btn) {
      return;
    }
    if (isShopInputLocked()) {
      return;
    }
    if (goldWallet < SHOP_PRICE_GOLD) {
      return;
    }
    var spec = btn._shopSpec;
    if (!spec) {
      return;
    }
    if (spec.extraCheck && !spec.extraCheck()) {
      return;
    }
    goldWallet -= SHOP_PRICE_GOLD;
    ownedPowerups.push({ type: spec.type });
    updateShopUi();
    updateCoinCounterUi();
  }

  if (shopBuyMount) {
    shopBuyMount.addEventListener("pointerdown", function (e) {
      var btn = e.target.closest(".shop-item-buy");
      if (!btn || !shopBuyMount.contains(btn)) {
        return;
      }
      if (btn.disabled) {
        return;
      }
      if (e.pointerType === "mouse" && e.button !== 0) {
        return;
      }
      e.preventDefault();
      tryShopPurchaseFromButton(btn);
    });
    shopBuyMount.addEventListener("keydown", function (e) {
      if (e.key !== "Enter" && e.key !== " ") {
        return;
      }
      if (e.repeat) {
        return;
      }
      var btn = e.target.closest(".shop-item-buy");
      if (!btn || !shopBuyMount.contains(btn)) {
        return;
      }
      if (btn.disabled) {
        return;
      }
      e.preventDefault();
      tryShopPurchaseFromButton(btn);
    });
  }

  bindInstantActivate(shopContinueBtn, function () {
    if (isShopInputLocked()) {
      return;
    }
    hideShopOverlay();
    if (shopAfterLevel >= MAX_LEVEL) {
      showCampaignOverlay();
    } else {
      currentLevel++;
      startLevel();
    }
  });

  bindInstantActivate(campaignNewRunBtn, function () {
    hideCampaignOverlay();
    startRun();
  });

  var resizeTimer;
  function scheduleRelayout(delayMs) {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () {
      layoutMaze();
      draw();
    }, delayMs);
  }

  function onResize() {
    scheduleRelayout(100);
  }

  window.addEventListener("resize", onResize);

  if (typeof ResizeObserver !== "undefined") {
    var mazeAreaEl = canvas.parentElement;
    if (mazeAreaEl) {
      new ResizeObserver(function () {
        scheduleRelayout(50);
      }).observe(mazeAreaEl);
    }
  }

  requestAnimationFrame(tickGame);
  startRun();
  if (SHOW_SHOP_ON_LOAD) {
    shopAfterLevel = currentLevel;
    showShopOverlay();
  }
})();
</script>
</body>
</html>

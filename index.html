        var r;
        var c;
        for (r = 0; r < rows; r++) {
          for (c = 0; c < cols; c++) {
            var x = offsetX + c * cellSize;
            var y = offsetY + r * cellSize;
            var w = grid[r][c];
            ctx.beginPath();
            if (w & N) {
              ctx.moveTo(x, y);
              ctx.lineTo(x + cellSize, y);
            }
            if (w & W) {
              ctx.moveTo(x, y);
              ctx.lineTo(x, y + cellSize);
            }
            if (c === cols - 1 && (w & E)) {
              ctx.moveTo(x + cellSize, y);
              ctx.lineTo(x + cellSize, y + cellSize);
            }
            if (r === rows - 1 && (w & S)) {
              ctx.moveTo(x, y + cellSize);
              ctx.lineTo(x + cellSize, y + cellSize);
            }
            ctx.stroke();
          }
        }
      }

      function drawExitGlow() {
        var gx = offsetX + (cols - 1) * cellSize + cellSize / 2;
        var gy = offsetY + (rows - 1) * cellSize + cellSize / 2;
        ctx.fillStyle = "rgba(255, 255, 255, 0.06)";
        ctx.beginPath();
        ctx.arc(gx, gy, cellSize * 0.38, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#888888";
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      function drawPendingCoinPickups() {
        pendingCoinKeys.forEach(function (key) {
          var comma = key.indexOf(",");
          var cr = parseInt(key.slice(0, comma), 10);
          var cc = parseInt(key.slice(comma + 1), 10);
          var cx = offsetX + cc * cellSize + cellSize / 2;
          var cy = offsetY + cr * cellSize + cellSize / 2;
          drawGoldPickupDisc(ctx, cx, cy, cellSize);
        });
      }

      function drawCoinPullAnimations(nowGoldFx) {
        var pai;
        for (pai = 0; pai < coinPullAnimations.length; pai++) {
          var ap = coinPullAnimations[pai];
          var tRaw = clamp01((nowGoldFx - ap.startMs) / ap.durationMs);
          var te = 1 - Math.pow(1 - tRaw, 3);
          var sx = offsetX + ap.sc * cellSize + cellSize / 2;
          var sy = offsetY + ap.sr * cellSize + cellSize / 2;
          var ex = offsetX + ap.ec * cellSize + cellSize / 2;
          var ey = offsetY + ap.er * cellSize + cellSize / 2;
          if (ap.absorbPlayer) {
            ex = offsetX + playerC * cellSize + cellSize / 2;
            ey = offsetY + playerR * cellSize + cellSize / 2;
          }
          var ix = sx + (ex - sx) * te;
          var iy = sy + (ey - sy) * te;
          if (ap.absorbPlayer && tRaw > 0.62) {
            ctx.save();
            ctx.globalAlpha = Math.max(0, 1 - (tRaw - 0.62) / 0.38);
          }
          drawGoldPickupDisc(ctx, ix, iy, cellSize);
          if (ap.absorbPlayer && tRaw > 0.62) {
            ctx.restore();
          }
        }
      }

      function drawPendingLevelPowerups() {
        var ppi;
        for (ppi = 0; ppi < pendingLevelPowerups.length; ppi++) {
          var pup = pendingLevelPowerups[ppi];
          var px = offsetX + pup.c * cellSize + cellSize / 2;
          var py = offsetY + pup.r * cellSize + cellSize / 2;
          var drawPu = POWERUP_DRAW[pup.type];
          if (drawPu) {
            ctx.save();
            ctx.translate(px, py);
            ctx.scale(POWERUP_MAZE_VISUAL_SCALE, POWERUP_MAZE_VISUAL_SCALE);
            ctx.translate(-px, -py);
            drawPu(ctx, px, py, cellSize);
            ctx.restore();
          }
        }
      }

      function drawActiveGameLayer(nowDraw) {
        if (!gameActive()) {
          return;
        }
        var mpos = getMonsterPixelPos(nowDraw);
        var mx = mpos.x;
        var my = mpos.y;
        var monHitR = monsterEffectiveHitRadius(nowDraw);
        var hidePreviewRSq = monHitR * monHitR;

        var previewSegs = [];
        var PREVIEW_MAX_TILE_EDGES = 4;
        var enemyFearedPreview = nowDraw < fearUntilMs;
        if (monsterGlideActive) {
          var glideEnd = tileCenterPixel(monsterGlideTc, monsterGlideTr);
          previewSegs.push({
            x0: mpos.x,
            y0: mpos.y,
            x1: glideEnd.x,
            y1: glideEnd.y,
          });
          var tail = enemyFearedPreview
            ? getMonsterFleePreviewPath(
                monsterGlideTr,
                monsterGlideTc,
                PREVIEW_MAX_TILE_EDGES
              )
            : shortestPath(
                monsterGlideTr,
                monsterGlideTc,
                playerR,
                playerC
              );
          appendTileCenterSegs(tail, PREVIEW_MAX_TILE_EDGES, previewSegs);
        } else {
          var fullM = enemyFearedPreview
            ? getMonsterFleePreviewPath(
                monsterR,
                monsterC,
                PREVIEW_MAX_TILE_EDGES
              )
            : shortestPath(monsterR, monsterC, playerR, playerC);
          if (fullM.length >= 2) {
            appendTileCenterSegs(fullM, PREVIEW_MAX_TILE_EDGES, previewSegs);
          }
        }
        strokeRedPreviewLine(ctx, previewSegs, mx, my, hidePreviewRSq);

        var mix;
        for (mix = 0; mix < spawnedEnemies.length; mix++) {
          var mPv = spawnedEnemies[mix];
          if (mPv.kind !== "minion") {
            continue;
          }
          var minionSegs = buildMinionPreviewSegs(mPv, nowDraw);
          var mnh = getMinionPixelPos(mPv, nowDraw);
          strokeRedPreviewLine(
            ctx,
            minionSegs,
            mnh.x,
            mnh.y,
            hidePreviewRSq
          );
        }

        if (nowDraw < monsterStunnedUntilMs) {
          ctx.save();
          ctx.globalAlpha = 0.52;
        }
        drawCanvasEmoji(
          ctx,
          EMOJI_ONI,
          mx,
          my,
          monHitR * 2.45 * EMOJI_VISUAL_SCALE,
          EMOJI_TINT_ENEMY
        );
        if (nowDraw < monsterStunnedUntilMs) {
          ctx.restore();
        }

        var ex;
        for (ex = 0; ex < spawnedEnemies.length; ex++) {
          var spawnEnt = spawnedEnemies[ex];
          if (spawnEnt.kind === "egg") {
            var grow = clamp01((nowDraw - spawnEnt.spawnMs) / EGG_HATCH_MS);
            var eggCen = tileCenterPixel(spawnEnt.cellC, spawnEnt.cellR);
            var eggFont =
              cellSize * 0.64 * EMOJI_VISUAL_SCALE * grow;
            if (
              spawnEnt.stunnedUntilMs &&
              nowDraw < spawnEnt.stunnedUntilMs
            ) {
              ctx.save();
              ctx.globalAlpha = 0.52;
            }
            drawCanvasEmoji(
              ctx,
              EMOJI_MINION,
              eggCen.x,
              eggCen.y,
              eggFont,
              EMOJI_TINT_EGG
            );
            if (
              spawnEnt.stunnedUntilMs &&
              nowDraw < spawnEnt.stunnedUntilMs
            ) {
              ctx.restore();
            }
          }
        }
        for (ex = 0; ex < spawnedEnemies.length; ex++) {
          var mn = spawnedEnemies[ex];
          if (mn.kind !== "minion") {
            continue;
          }
          var mnp = getMinionPixelPos(mn, nowDraw);
          if (nowDraw < mn.stunnedUntilMs) {
            ctx.save();
            ctx.globalAlpha = 0.52;
          }
          drawCanvasEmoji(
            ctx,
            EMOJI_MINION,
            mnp.x,
            mnp.y,
            cellSize * 0.64 * EMOJI_VISUAL_SCALE,
            EMOJI_TINT_ENEMY
          );
          if (nowDraw < mn.stunnedUntilMs) {
            ctx.restore();
          }
        }
      }

      function drawInvulnAura(px, py, now) {
        if (now >= invulnerableUntilMs) {
          return;
        }
        var r = cellSize * 0.38;
        var breathe = 1.0 + 0.1 * Math.sin(now * 0.005);
        var sr = r * breathe;
        var alpha = 0.35 + 0.2 * Math.sin(now * 0.004);
        ctx.save();
        ctx.strokeStyle = "rgba(80,220,255," + alpha.toFixed(2) + ")";
        ctx.lineWidth = Math.max(1.5, cellSize * 0.04);
        ctx.beginPath();
        ctx.moveTo(px, py - sr);
        ctx.lineTo(px + sr, py);
        ctx.lineTo(px, py + sr);
        ctx.lineTo(px - sr, py);
        ctx.closePath();
        ctx.stroke();
        var grd = ctx.createRadialGradient(px, py, sr * 0.2, px, py, sr);
        grd.addColorStop(0, "rgba(80,220,255,0.12)");
        grd.addColorStop(1, "rgba(80,220,255,0)");
        ctx.fillStyle = grd;
        ctx.fill();
        ctx.restore();
      }

      function drawPhaseAura(px, py, now) {
        if (now >= phaseUntilMs) {
          return;
        }
        var r = cellSize * 0.42;
        var rot = (now * 0.002) % (Math.PI * 2);
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(rot);
        ctx.strokeStyle = "rgba(140,250,255,0.45)";
        ctx.lineWidth = Math.max(1.5, cellSize * 0.035);
        ctx.setLineDash([cellSize * 0.12, cellSize * 0.1]);
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }

      function drawMagnetAura(px, py, now) {
        if (now >= magnetUntilMs) {
          return;
        }
        var r = cellSize * 0.48;
        var dotCount = 4;
        var baseAngle = now * 0.003;
        var dotR = Math.max(2, cellSize * 0.06);
        var mi;
        for (mi = 0; mi < dotCount; mi++) {
          var ang = baseAngle + (mi / dotCount) * Math.PI * 2;
          var dx = px + Math.cos(ang) * r;
          var dy = py + Math.sin(ang) * r;
          var grd = ctx.createRadialGradient(
            dx - dotR * 0.3, dy - dotR * 0.3, dotR * 0.1,
            dx, dy, dotR
          );
          grd.addColorStop(0, "#fff4a8");
          grd.addColorStop(0.5, "#e8c030");
          grd.addColorStop(1, "#a67c10");
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(dx, dy, dotR, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawFearAura(px, py, now) {
        if (now >= fearUntilMs) {
          return;
        }
        var r = cellSize * 0.44;
        var rot = -(now * 0.0015) % (Math.PI * 2);
        var alpha = 0.25 + 0.15 * Math.sin(now * 0.006);
        var arcCount = 3;
        var arcLen = Math.PI * 0.45;
        ctx.save();
        ctx.strokeStyle = "rgba(160,60,240," + alpha.toFixed(2) + ")";
        ctx.lineWidth = Math.max(2, cellSize * 0.055);
        ctx.lineCap = "round";
        var ai;
        for (ai = 0; ai < arcCount; ai++) {
          var start = rot + (ai / arcCount) * Math.PI * 2;
          ctx.beginPath();
          ctx.arc(px, py, r, start, start + arcLen);
          ctx.stroke();
        }
        ctx.lineCap = "butt";
        ctx.restore();
      }

      var FLASH_DRAW = {
        cooldown: function (ctx, px, py, t) {
          var scale = 0.5 + t * 0.7;
          var alpha = 1 - t;
          var r = cellSize * 0.3 * scale;
          ctx.save();
          ctx.globalAlpha = alpha * 0.6;
          ctx.strokeStyle = "#d0b0ff";
          ctx.lineWidth = Math.max(1, cellSize * 0.03);
          ctx.beginPath();
          ctx.arc(px, py, r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.strokeStyle = "rgba(255,255,255,0.8)";
          ctx.lineWidth = Math.max(1, cellSize * 0.025);
          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.lineTo(px, py - r * 0.6);
          ctx.moveTo(px, py);
          ctx.lineTo(px + r * 0.4, py + r * 0.1);
          ctx.stroke();
          ctx.restore();
        },
        wall: function (ctx, px, py, t) {
          var alpha = 1 - t;
          var spread = cellSize * 0.15 + t * cellSize * 0.3;
          ctx.save();
          ctx.globalAlpha = alpha * 0.7;
          ctx.strokeStyle = "#c09050";
          ctx.lineWidth = Math.max(1.5, cellSize * 0.04);
          ctx.lineCap = "round";
          var wi;
          for (wi = 0; wi < 6; wi++) {
            var wa = (wi / 6) * Math.PI * 2;
            ctx.beginPath();
            ctx.moveTo(
              px + Math.cos(wa) * spread * 0.3,
              py + Math.sin(wa) * spread * 0.3
            );
            ctx.lineTo(
              px + Math.cos(wa) * spread,
              py + Math.sin(wa) * spread
            );
            ctx.stroke();
          }
          ctx.lineCap = "butt";
          ctx.restore();
        },
        banish: function (ctx, px, py, t) {
          var scale = 0.4 + t * 0.8;
          var alpha = 1 - t;
          var arm = cellSize * 0.22 * scale;
          ctx.save();
          ctx.globalAlpha = alpha * 0.75;
          ctx.strokeStyle = "#ff5050";
          ctx.lineWidth = Math.max(2, cellSize * 0.06);
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(px - arm, py - arm);
          ctx.lineTo(px + arm, py + arm);
          ctx.moveTo(px + arm, py - arm);
          ctx.lineTo(px - arm, py + arm);
          ctx.stroke();
          ctx.lineCap = "butt";
          ctx.restore();
        },
        goldBurst: function (ctx, px, py, t) {
          var alpha = 1 - t;
          var dist = cellSize * (0.1 + t * 0.35);
          var dotR = Math.max(1.5, cellSize * 0.04) * (1 - t * 0.5);
          ctx.save();
          ctx.globalAlpha = alpha * 0.7;
          var gi;
          for (gi = 0; gi < 8; gi++) {
            var ga = (gi / 8) * Math.PI * 2 - Math.PI / 2;
            var gx = px + Math.cos(ga) * dist;
            var gy = py + Math.sin(ga) * dist;
            ctx.fillStyle = "#f0d040";
            ctx.beginPath();
            ctx.arc(gx, gy, dotR, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        },
        stunNova: function (ctx, px, py, t) {
          var alpha = (1 - t) * 0.6;
          var r = cellSize * (0.2 + t * 0.5);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = "#f8e040";
          ctx.lineWidth = Math.max(2, cellSize * 0.05) * (1 - t * 0.5);
          ctx.beginPath();
          ctx.arc(px, py, r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        },
      };

      function drawPickupFlashes(px, py, now) {
        var fi = playerPickupFlashes.length - 1;
        while (fi >= 0) {
          var fl = playerPickupFlashes[fi];
          var elapsed = now - fl.startMs;
          if (elapsed >= FLASH_DURATION_MS) {
            playerPickupFlashes.splice(fi, 1);
            fi--;
            continue;
          }
          var t = clamp01(elapsed / FLASH_DURATION_MS);
          var fn = FLASH_DRAW[fl.type];
          if (fn) {
            fn(ctx, px, py, t);
          }
          fi--;
        }
      }

      function drawPlayerAvatar(nowDraw) {
        var ppos = getPlayerPixelPos(nowDraw);
        var px = ppos.x;
        var py = ppos.y;

        drawInvulnAura(px, py, nowDraw);
        drawPhaseAura(px, py, nowDraw);

        if (nowDraw < phaseUntilMs) {
          ctx.save();
          ctx.globalAlpha = 0.62;
        }
        drawCanvasEmoji(
          ctx,
          EMOJI_PLAYER_KNIGHT,
          px,
          py,
          cellSize * 0.68 * EMOJI_VISUAL_SCALE,
          EMOJI_TINT_PLAYER
        );
        if (nowDraw < phaseUntilMs) {
          ctx.restore();
        }

        drawMagnetAura(px, py, nowDraw);
        drawFearAura(px, py, nowDraw);
        drawPickupFlashes(px, py, nowDraw);
      }

      function draw() {
        syncCanvasBackingStore();
        var cw = canvas.clientWidth;
        var ch = canvas.clientHeight;
        if (cw < 1 || ch < 1) {
          return;
        }
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, cw, ch);

        drawMazeWalls();
        drawExitGlow();
        drawPendingCoinPickups();
        var nowDraw = performance.now();
        drawCoinPullAnimations(nowDraw);
        drawPendingLevelPowerups();
        drawActiveGameLayer(nowDraw);
        drawPlayerAvatar(nowDraw);
      }

      var DIRS = ["north", "south", "east", "west"];
      var dpadRoot = document.getElementById("dpadRoot");
      var dpadCooldownFillGlobal = dpadRoot
        ? dpadRoot.querySelector(".dpad-cooldown-fill-global")
        : null;
      var QUEUE_WINDOW_MS = 100;
      var moveCooldownStart = 0;
      var moveCooldownEnd = 0;
      var queued = { north: false, south: false, east: false, west: false };

      function clearMoveQueue() {
        var di;
        for (di = 0; di < DIRS.length; di++) {
          queued[DIRS[di]] = false;
        }
      }

      var KEY_TO_DIR = {
        ArrowUp: "north",
        ArrowDown: "south",
        ArrowLeft: "west",
        ArrowRight: "east"
      };

      function canStepFrom(r, c, dir, nowMs) {
        var d = DIR_MOVE[dir];
        if (!d) {
          return false;
        }
        var stepNow = nowMs !== undefined ? nowMs : performance.now();
        var nr = r + d.dr;
        var nc = c + d.dc;
        if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) {
          return false;
        }
        if (stepNow < phaseUntilMs) {
          return true;
        }
        return !(grid[r][c] & d.m);
      }

      function attemptMove(dir) {
        if (!gameActive()) return false;
        if (playerGlideActive) return false;

        var moveNow = performance.now();
        if (!canStepFrom(playerR, playerC, dir, moveNow)) {
          var nb = neighborCell(playerR, playerC, dir);
          if (
            nb.r < 0 ||
            nb.r >= rows ||
            nb.c < 0 ||
            nb.c >= cols
          ) {
            return false;
          }
          if (wallBreakCharges <= 0) {
            return false;
          }
          if (!tryOpenInternalWallForPlayer(playerR, playerC, dir)) {
            return false;
          }
          wallBreakCharges--;
        }

        var dm = DIR_MOVE[dir];
        var nr = playerR + (dm ? dm.dr : 0);
        var nc = playerC + (dm ? dm.dc : 0);

        var oldPr = playerR;
        var oldPc = playerC;
        playerR = nr;
        playerC = nc;

        var pfr;
        var pfc;
        if (playerGlideActive) {
          var pRawU = clamp01((moveNow - playerGlideStartMs) / PLAYER_GLIDE_MS);
          var pSmooth = pRawU * pRawU * (3 - 2 * pRawU);
          pfr = playerGlideFr + (playerGlideTr - playerGlideFr) * pSmooth;
          pfc = playerGlideFc + (playerGlideTc - playerGlideFc) * pSmooth;
        } else {
          pfr = oldPr;
          pfc = oldPc;
        }
        playerGlideFr = pfr;
        playerGlideFc = pfc;
        playerGlideTr = playerR;
        playerGlideTc = playerC;
        playerGlideStartMs = moveNow;
        playerGlideActive = true;

        if (hitboxesOverlap(moveNow)) {
          triggerLose();
          return true;
        }
        return true;
      }

      function startMoveCooldown(now) {
        moveCooldownStart = now;
        moveCooldownEnd = now + effectiveCooldownMs();
      }

      function resetCooldowns() {
        moveCooldownStart = 0;
        moveCooldownEnd = 0;
        clearMoveQueue();
        if (dpadRoot) dpadRoot.classList.remove("dpad--cooling");
        if (dpadCooldownFillGlobal) {
          dpadCooldownFillGlobal.style.transform = "scaleY(0)";
        }
      }

      function tickMonster(now, dt) {
        if (!gameActive()) return;
        if (now < monsterGrowStartMs + MONSTER_GROW_MS) {
          return;
        }
        if (now < monsterStunnedUntilMs) {
          if (monsterGlideActive && dt > 0) {
            monsterGlideStartMs += dt;
          }
          return;
        }
        var guard = 0;
        while (guard < 32) {
          guard++;
          if (monsterGlideActive) {
            if (now < monsterGlideStartMs + MONSTER_TILE_MS) {
              return;
            }
            monsterR = monsterGlideTr;
            monsterC = monsterGlideTc;
            monsterGlideActive = false;
            if (hitboxesOverlap(now)) {
              triggerLose();
              return;
            }
            continue;
          }
          var path;
          if (now < fearUntilMs) {
            var fd = fullBfsDistFromPlayer();
            var fleeN = pickMonsterFleeStep(monsterR, monsterC, fd);
            if (!fleeN) {
              if (hitboxesOverlap(now)) {
                triggerLose();
              }
              return;
            }
            path = [{ r: monsterR, c: monsterC }, fleeN];
          } else {
            path = shortestPath(monsterR, monsterC, playerR, playerC);
          }
          if (path.length < 2) {
            if (hitboxesOverlap(now)) {
              triggerLose();
            }
            return;
          }
          monsterGlideFr = monsterR;
          monsterGlideFc = monsterC;
          monsterGlideTr = path[1].r;
          monsterGlideTc = path[1].c;
          monsterGlideStartMs = now;
          monsterGlideActive = true;
          return;
        }
      }

      function tickEggDropsAndHatch(now, dt) {
        if (!gameActive()) {
          return;
        }
        if (now >= nextEggDropAt) {
          var mp = getMonsterPixelPos(now);
          var cell = pixelCellFromPixel(mp.x, mp.y);
          spawnedEnemies.push({
            kind: "egg",
            hurtsPlayer: false,
            spawnMs: now,
            cellR: cell.r,
            cellC: cell.c,
          });
          do {
            nextEggDropAt += consumeNextEggDropGapMs();
          } while (nextEggDropAt <= now);
        }
        var hi;
        for (hi = spawnedEnemies.length - 1; hi >= 0; hi--) {
          var ent = spawnedEnemies[hi];
          if (ent.kind === "egg") {
            if (ent.stunnedUntilMs && now < ent.stunnedUntilMs) {
              if (dt > 0) {
                ent.spawnMs += dt;
              }
              continue;
            }
            if (now >= ent.spawnMs + EGG_HATCH_MS) {
              spawnedEnemies[hi] = {
                kind: "minion",
                r: ent.cellR,
                c: ent.cellC,
                fromR: -1,
                fromC: -1,
                plannedCells: [],
                glideActive: false,
                fr: ent.cellR,
                fc: ent.cellC,
                tr: ent.cellR,
                tc: ent.cellC,
                stunnedUntilMs: 0,
              };
            }
          }
        }
      }

      function tickMinions(now, dt) {
        if (!gameActive()) {
          return;
        }
        var mi;
        for (mi = 0; mi < spawnedEnemies.length; mi++) {
          var m = spawnedEnemies[mi];
          if (m.kind !== "minion") {
            continue;
          }
          if (now < m.stunnedUntilMs) {
            if (m.glideActive && dt > 0) {
              m.glideStartMs += dt;
            }
            continue;
          }
          var guard = 0;
          while (guard < 32) {
            guard++;
            if (m.glideActive) {
              if (now < m.glideStartMs + MONSTER_TILE_MS) {
                break;
              }
              m.fromR = m.fr;
              m.fromC = m.fc;
              m.r = m.tr;
              m.c = m.tc;
              m.glideActive = false;
              if (
                m.plannedCells.length &&
                m.plannedCells[0].r === m.r &&
                m.plannedCells[0].c === m.c
              ) {
                m.plannedCells.shift();
              } else {
                m.plannedCells = [];
              }
              replenishMinionPlannedPath(m, MIN_MINION_PLAN_LEN, now);
              if (hitboxesOverlap(now)) {
                triggerLose();
                return;
              }
              continue;
            }
            replenishMinionPlannedPath(m, MIN_MINION_PLAN_LEN, now);
            if (!m.plannedCells.length) {
              break;
            }
            var tgt = m.plannedCells[0];
            if (
              !minionPlanTargetValid(
                m.r,
                m.c,
                m.fromR,
                m.fromC,
                tgt.r,
                tgt.c
              )
            ) {
              m.plannedCells = [];
              continue;
            }
            m.fr = m.r;
            m.fc = m.c;
            m.tr = tgt.r;
            m.tc = tgt.c;
            m.glideStartMs = now;
            m.glideActive = true;
            break;
          }
        }
      }

      function requestMove(dir) {
        if (!gameActive()) return;
        var now = performance.now();
        if (playerGlideActive) {
          if (canBufferDir(dir)) {
            bufferedPlayerDir = dir;
          }
          return;
        }
        if (now >= moveCooldownEnd) {
          if (attemptMove(dir)) {
            startMoveCooldown(now);
            clearMoveQueue();
          }
          return;
        }
        var left = moveCooldownEnd - now;
        if (left <= QUEUE_WINDOW_MS && left > 0) {
          queued[dir] = true;
        }
      }

      function tickGame() {
        var now = performance.now();
        var dt = lastGameTickMs > 0 ? now - lastGameTickMs : 0;
        lastGameTickMs = now;
        tickMonster(now, dt);
        tickEggDropsAndHatch(now, dt);
        tickMinions(now, dt);
        applyMagnetGoldPull(now);
        if (gameActive() && hitboxesOverlap(now)) {
          triggerLose();
        }
        if (playerGlideActive && now >= playerGlideStartMs + PLAYER_GLIDE_MS) {
          playerGlideActive = false;
          onPlayerArrivedOnTile(now);
          if (bufferedPlayerDir !== null && gameActive()) {
            var nextDir = bufferedPlayerDir;
            bufferedPlayerDir = null;
            if (now >= moveCooldownEnd) {
              if (attemptMove(nextDir)) {
                startMoveCooldown(now);
                clearMoveQueue();
              }
            } else {
              queued[nextDir] = true;
            }
          }
        }
        if (now >= moveCooldownEnd) {
          var qDir = null;
          var qi;
          for (qi = 0; qi < DIRS.length; qi++) {
            if (queued[DIRS[qi]]) {
              qDir = DIRS[qi];
              break;
            }
          }
          if (qDir !== null && gameActive()) {
            clearMoveQueue();
            if (playerGlideActive) {
              if (canBufferDir(qDir)) {
                bufferedPlayerDir = qDir;
              }
            } else if (attemptMove(qDir)) {
              startMoveCooldown(now);
            }
          }
        }
        var cdDurAll = moveCooldownEnd - moveCooldownStart;
        if (cdDurAll < 1) {
          cdDurAll = 1;
        }
        var pAll = clamp01(
          now >= moveCooldownEnd ? 0 : (now - moveCooldownStart) / cdDurAll
        );
        if (dpadRoot && dpadCooldownFillGlobal) {
          if (now >= moveCooldownEnd) {
            dpadCooldownFillGlobal.style.transform = "scaleY(0)";
            dpadRoot.classList.remove("dpad--cooling");
          } else {
            dpadCooldownFillGlobal.style.transform = "scaleY(" + pAll + ")";
            dpadRoot.classList.add("dpad--cooling");
          }
        }
        draw();
        requestAnimationFrame(tickGame);
      }

      function bindInstantActivate(el, handler) {
        if (!el) {
          return;
        }
        el.addEventListener("pointerdown", function (e) {
          if (el.disabled) {
            return;
          }
          if (e.pointerType === "mouse" && e.button !== 0) {
            return;
          }
          e.preventDefault();
          handler(e);
        });
        el.addEventListener("keydown", function (e) {
          if (el.disabled) {
            return;
          }
          if (e.key !== "Enter" && e.key !== " ") {
            return;
          }
          if (e.repeat) {
            return;
          }
          e.preventDefault();
          handler(e);
        });
      }

      document.querySelectorAll(".dpad-btn[data-dir]").forEach(function (btn) {
        bindInstantActivate(btn, function () {
          requestMove(btn.getAttribute("data-dir"));
        });
      });

      window.addEventListener("keydown", function (e) {
        var d = KEY_TO_DIR[e.key];
        if (!d) return;
        e.preventDefault();
        requestMove(d);
      });

      bindInstantActivate(newMazeBtn, function () {
        startRun();
      });

      bindInstantActivate(loseNewBtn, function () {
        resetRun();
      });

      SHOP_BUY_SPECS.forEach(function (spec) {
        bindInstantActivate(spec.el, function () {
          if (goldWallet < SHOP_PRICE_GOLD) {
            return;
          }
          if (spec.extraCheck && !spec.extraCheck()) {
            return;
          }
          goldWallet -= SHOP_PRICE_GOLD;
          ownedPowerups.push({ type: spec.type });
          updateShopUi();
          updateCoinCounterUi();
        });
      });

      bindInstantActivate(shopContinueBtn, function () {
        hideShopOverlay();
        if (shopAfterLevel >= MAX_LEVEL) {
          showCampaignOverlay();
        } else {
          currentLevel++;
          startLevel();
        }
      });

      bindInstantActivate(campaignNewRunBtn, function () {
        hideCampaignOverlay();
        startRun();
      });

      var resizeTimer;
      function scheduleRelayout(delayMs) {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function () {
          layoutMaze();
          draw();
        }, delayMs);
      }

      function onResize() {
        scheduleRelayout(100);
      }

      window.addEventListener("resize", onResize);

      if (typeof ResizeObserver !== "undefined") {
        var mazeAreaEl = canvas.parentElement;
        if (mazeAreaEl) {
          new ResizeObserver(function () {
            scheduleRelayout(50);
          }).observe(mazeAreaEl);
        }
      }

      requestAnimationFrame(tickGame);
      startRun();
      if (SHOW_SHOP_ON_LOAD) {
        shopAfterLevel = currentLevel;
        showShopOverlay();
      }
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Maze</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html{font-size:150%}
    html,body{margin:0;min-height:100%;min-height:100dvh;background:#000;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
    .game-shell{--shell-w:500;--shell-h:718;aspect-ratio:var(--shell-w)/var(--shell-h);width:min(100vw,calc(100dvh*var(--shell-w)/var(--shell-h)));height:auto;max-width:100vw;max-height:100dvh;display:flex;flex-direction:column;background:#000;box-shadow:0 14px 56px rgba(0,0,0,.94),0 0 0 1px rgba(255,255,255,.04) inset;position:relative;overflow:hidden;border-radius:0;isolation:isolate;container-type:size;container-name:game}
    .game-shell::before,.game-shell::after{content:"";position:absolute;inset:0;pointer-events:none}
    .game-shell::before{z-index:4;opacity:.22;background:linear-gradient(90deg,rgba(120,255,214,.04) 0,rgba(255,255,255,0) 38%,rgba(98,174,255,.04) 100%)}
    .game-shell::after{z-index:4;background:radial-gradient(160% 108% at 50% -6%,rgba(255,255,255,.2) 0,rgba(255,255,255,.05) 15%,rgba(255,255,255,0) 38%),radial-gradient(128% 98% at 50% 50%,rgba(255,255,255,.06) 0,rgba(255,255,255,0) 34%,rgba(0,0,0,0) 60%,rgba(0,0,0,.08) 78%,rgba(0,0,0,.2) 100%),radial-gradient(34% 18% at 0 0,rgba(0,0,0,.2) 0,rgba(0,0,0,.08) 42%,rgba(0,0,0,0) 72%),radial-gradient(34% 18% at 100% 0,rgba(0,0,0,.2) 0,rgba(0,0,0,.08) 42%,rgba(0,0,0,0) 72%),radial-gradient(34% 18% at 0 100%,rgba(0,0,0,.18) 0,rgba(0,0,0,.08) 42%,rgba(0,0,0,0) 72%),radial-gradient(34% 18% at 100% 100%,rgba(0,0,0,.18) 0,rgba(0,0,0,.08) 42%,rgba(0,0,0,0) 72%),linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,0) 12%,rgba(0,0,0,.06) 88%,rgba(0,0,0,.14))}
    .maze-area{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;background:#000;position:relative}
    .coin-counter{position:absolute;top:8px;right:10px;z-index:5;max-width:calc(100% - 16px);text-align:right;font-size:clamp(.72rem,3.6cqw,.95rem);font-weight:600;color:#c8c8c8;text-shadow:0 1px 3px rgba(0,0,0,.9);letter-spacing:.02em;line-height:1.35;pointer-events:none;user-select:none}
    .coin-counter .coin-counter-gold{color:#eecf40;text-shadow:0 1px 3px rgba(0,0,0,.9),0 0 12px rgba(232,192,48,.28)}
    #shopOverlay.win-overlay{align-items:stretch;justify-content:stretch;padding:0}
    .shop-panel{width:100%;height:100%;max-width:none;max-height:none;overflow-y:auto;padding:clamp(6px,2.2cqw,16px) clamp(6px,2.8cqw,18px) clamp(4px,1.5cqw,10px);border-radius:0;background:#000;border:none;display:flex;flex-direction:column;gap:clamp(1px,0.45cqw,4px);box-sizing:border-box;color:#c6c6c6}
    #shopBuyMount{display:flex;flex-direction:column;gap:1px;width:100%}
    .shop-panel>.win-title{font-size:clamp(1.05rem,6.2cqw,1.5rem);line-height:1.02;margin:0;text-align:center}
    .shop-sub{margin:0;font-size:clamp(.74rem,3.5cqw,.94rem);color:#8c8c8c;text-align:center;line-height:1.08}
    #shopGoldLine{color:#eecf40;font-weight:600;font-size:clamp(1.02rem,4.9cqw,1.28rem);line-height:1.05;margin:0;text-align:center;text-shadow:0 1px 3px rgba(0,0,0,.85),0 0 14px rgba(232,192,48,.22)}
    button.shop-item-buy{width:100%;display:flex;flex-direction:row;align-items:center;gap:clamp(6px,2.2cqw,12px);padding:clamp(4px,1.35cqw,8px) clamp(5px,2cqw,12px);border-radius:clamp(5px,1.6cqw,10px);background:#0a0a0a;border:max(1px,.4cqw) solid #3a3a3a;cursor:pointer;touch-action:manipulation;text-align:left;font:inherit;font-size:clamp(.8rem,3.25cqw,.98rem);color:inherit;box-sizing:border-box;transition:transform .08s ease,border-color .12s ease,box-shadow .12s ease}
    button.shop-item-buy:hover:not(:disabled){border-color:#6e6e6e;box-shadow:0 0 0 max(2px,.6cqw) rgba(255,255,255,.06)}
    button.shop-item-buy:focus{outline:none}
    button.shop-item-buy:focus-visible{outline:max(1px,.35cqw) solid #909090;outline-offset:max(2px,.6cqw)}
    button.shop-item-buy:not(:disabled):active{transform:scale(.99);filter:brightness(.96)}
    button.shop-item-buy:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
    button.shop-item-buy .shop-pickup-preview{pointer-events:none}
    .shop-pickup-preview{flex:0 0 auto;width:clamp(53px,18cqw,110px);height:clamp(53px,18cqw,110px);border-radius:clamp(7px,2.65cqw,14px);background:#050505;border:max(1px,.4cqw) solid #5a5a5a;display:flex;align-items:center;justify-content:center;box-sizing:border-box}
    .shop-pickup-preview span{box-sizing:border-box}
    button.shop-item-buy:not(:disabled):hover .shop-pickup-preview{border-color:#8a8a8a}
    button.shop-item-buy:disabled .shop-pickup-preview{border-color:#2a2a2a}
    .shop-item-main{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:clamp(1px,0.55cqw,4px);text-align:left}
    .shop-preview-cooldown{width:46%;height:46%;border-radius:50%;background:radial-gradient(circle at 30% 30%,#e8bfff,#c080ff 38%,#7040b0 88%);border:max(1px,.6cqw) solid #9050d8;box-shadow:0 0 max(4px,1.4cqw) rgba(180,120,255,.45),inset 0 -25% 20% rgba(60,20,100,.35),inset 0 25% 10% rgba(255,255,255,.2);position:relative}
    .shop-preview-cooldown::after{content:"";position:absolute;inset:18% 22% auto 22%;height:28%;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,0));z-index:1;pointer-events:none}
    .shop-preview-cd-hand{position:absolute;left:50%;bottom:50%;width:max(1.5px,.38cqw);height:28%;margin-left:max(-.75px,-.19cqw);transform-origin:50% 100%;border-radius:max(1px,.2cqw);background:rgba(255,255,255,.78);z-index:2;pointer-events:none}
    .shop-preview-cd-hand--a{transform:translateY(0) rotate(0)}
    .shop-preview-cd-hand--b{height:20%;transform:translateY(0) rotate(104deg)}
    .shop-preview-wall{width:52%;height:42%;border-radius:clamp(3px,1.4cqw,8px);background:linear-gradient(170deg,#e8c880 0%,#c49848 30%,#8b6040 70%,#6a4428 100%);border:max(1px,.6cqw) solid #6a4020;box-shadow:inset 0 max(1px,.35cqw) 0 rgba(255,230,180,.4),inset 0 -1px 0 rgba(40,20,0,.4),0 max(1px,.4cqw) max(3px,1cqw) rgba(0,0,0,.35);position:relative;overflow:hidden}
    .shop-preview-wall::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent 47%,rgba(60,30,10,.35) 47%,rgba(60,30,10,.35) 53%,transparent 53%),linear-gradient(0deg,transparent 44%,rgba(60,30,10,.3) 44%,rgba(60,30,10,.3) 56%,transparent 56%);pointer-events:none}
    .shop-preview-wall::after{content:"";position:absolute;top:6%;left:10%;width:50%;height:22%;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,.35),rgba(255,255,255,0))}
    .shop-preview-invuln-wrap{width:50%;height:50%;display:flex;align-items:center;justify-content:center}
    .shop-preview-invuln{width:62.5%;height:62.5%;background:linear-gradient(135deg,#bef0ff,#60d8f8 40%,#20a0d0 75%,#1878a8);border:max(1px,.6cqw) solid #30b0e0;transform:rotate(45deg);box-shadow:0 0 max(5px,1.6cqw) rgba(80,200,255,.5),inset 0 0 30% rgba(255,255,255,.3);position:relative;overflow:hidden}
    .shop-preview-invuln::after{content:"";position:absolute;top:-10%;left:10%;width:60%;height:50%;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,0));transform:rotate(-45deg)}
    .shop-preview-magnet{width:56%;height:56%;position:relative;display:flex;align-items:center;justify-content:center;aspect-ratio:1;background:no-repeat center/contain;background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'30%2034%2040%2035'%3E%3Cdefs%3E%3ClinearGradient%20id%3D'g'%20gradientUnits%3D'userSpaceOnUse'%20x1%3D'36'%20y1%3D'50'%20x2%3D'64'%20y2%3D'50'%3E%3Cstop%20offset%3D'0'%20stop-color%3D'%23e06060'%2F%3E%3Cstop%20offset%3D'0.45'%20stop-color%3D'%23d04040'%2F%3E%3Cstop%20offset%3D'0.55'%20stop-color%3D'%233060d0'%2F%3E%3Cstop%20offset%3D'1'%20stop-color%3D'%234878e0'%2F%3E%3C%2FlinearGradient%3E%3CradialGradient%20id%3D'h'%20gradientUnits%3D'userSpaceOnUse'%20cx%3D'49.02'%20cy%3D'43.27'%20r%3D'5.39'%20fx%3D'46.08'%20fy%3D'39.84'%3E%3Cstop%20offset%3D'0'%20stop-color%3D'rgba(255%2C255%2C255%2C0.55)'%2F%3E%3Cstop%20offset%3D'1'%20stop-color%3D'rgba(255%2C255%2C255%2C0)'%2F%3E%3C%2FradialGradient%3E%3C%2Fdefs%3E%3Cpath%20fill%3D'url(%23g)'%20stroke%3D'%23802020'%20stroke-width%3D'3.2'%20stroke-linejoin%3D'round'%20stroke-linecap%3D'round'%20d%3D'M36%2039L43.84%2039L43.84%2051.76A6.16%206.16%200%200%200%2056.16%2051.76L64%2039L64%2051.76A14%2014%200%200%201%2036%2051.76Z'%2F%3E%3Crect%20x%3D'36'%20y%3D'39'%20width%3D'7.84'%20height%3D'4.84'%20fill%3D'%23c0c0c0'%2F%3E%3Crect%20x%3D'56.16'%20y%3D'39'%20width%3D'7.84'%20height%3D'4.84'%20fill%3D'%23c0c0c0'%2F%3E%3Ccircle%20cx%3D'50'%20cy%3D'46.7'%20r%3D'9.8'%20fill%3D'url(%23h)'%2F%3E%3C%2Fsvg%3E")}
    .shop-preview-fear{width:42%;height:42%;border-radius:50%;background:radial-gradient(circle at 38% 32%,#d88aff,#9040d0 45%,#4a1878 85%);border:max(1px,.6cqw) solid #7a38b0;box-shadow:0 0 max(5px,1.6cqw) rgba(160,60,240,.5),inset 0 -20% 25% rgba(20,0,40,.5);position:relative;overflow:hidden}
    .shop-preview-fear::before{content:"";position:absolute;top:20%;left:14%;width:72%;height:30%;pointer-events:none;background:radial-gradient(ellipse 42% 88% at 28% 50%,#1a0830 0%,#1a0830 42%,rgba(20,0,40,.65) 58%,transparent 60%),radial-gradient(ellipse 42% 88% at 72% 50%,#1a0830 0%,#1a0830 42%,rgba(20,0,40,.65) 58%,transparent 60%)}
    .shop-preview-fear::after{content:"";position:absolute;top:6%;left:18%;width:42%;height:26%;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,.35),rgba(255,255,255,0))}
    .shop-preview-banish{width:42%;height:42%;border-radius:50%;background:radial-gradient(circle at 40% 36%,#a0a8b8,#6a7080 50%,#3a3e48 90%);border:max(1px,.6cqw) solid #cc4444;box-shadow:0 0 max(4px,1.4cqw) rgba(220,50,50,.4),inset 0 -20% 20% rgba(0,0,0,.35),inset 0 20% 10% rgba(255,255,255,.15);position:relative;overflow:hidden}
    .shop-preview-banish::before,.shop-preview-banish::after{content:"";position:absolute;left:50%;top:50%;width:max(2px,.55cqw);height:52%;background:linear-gradient(180deg,#ff8080,#e04040);border-radius:max(1px,.35cqw);box-shadow:0 0 max(2px,.6cqw) rgba(255,80,80,.5)}
    .shop-preview-banish::before{transform:translate(-50%,-50%) rotate(45deg)}
    .shop-preview-banish::after{transform:translate(-50%,-50%) rotate(-45deg)}
    .shop-preview-gold-burst{position:relative;width:86%;height:auto;aspect-ratio:4256/3556;margin:0 auto}
    .shop-preview-gold-coin{position:absolute;width:34.2%;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff4a8 0%,#e8c030 45%,#a67c10 100%);border:max(1px,.4cqw) solid #8a6a18;box-sizing:border-box;pointer-events:none}
    .shop-preview-gold-coin--t{left:50%;top:20.5%;transform:translate(-50%,-50%)}
    .shop-preview-gold-coin--bl{left:17.1%;top:79.5%;transform:translate(-50%,-50%)}
    .shop-preview-gold-coin--br{left:82.9%;top:79.5%;transform:translate(-50%,-50%)}
    .shop-preview-phase{width:42%;height:42%;border-radius:50%;border:max(2px,.7cqw) dashed rgba(140,250,255,.95);background:radial-gradient(circle at 40% 35%,rgba(200,255,255,.4),rgba(80,200,220,.25) 48%,rgba(40,100,120,.1));box-shadow:0 0 max(5px,1.6cqw) rgba(100,220,255,.35),inset 0 0 max(4px,1.4cqw) rgba(100,220,255,.15);position:relative;overflow:hidden}
    .shop-preview-phase::before{content:"";position:absolute;left:50%;top:50%;width:52%;height:52%;transform:translate(-50%,-50%);border-radius:50%;border:max(1px,.25cqw) dashed rgba(140,250,255,.55);pointer-events:none}
    .shop-preview-phase::after{content:"";position:absolute;top:8%;left:15%;width:45%;height:30%;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,.45),rgba(255,255,255,0));pointer-events:none}
    .shop-preview-stun-nova{width:42%;height:42%;border-radius:50%;background:radial-gradient(circle at 42% 38%,#fffce0,#f8e040 35%,#d0a020 75%,#a07810);border:max(1px,.6cqw) solid #d8b030;box-shadow:0 0 max(6px,2cqw) rgba(255,220,40,.5),0 0 max(2px,.6cqw) rgba(255,255,200,.3);position:relative;overflow:hidden}
    .shop-preview-stun-nova::before{content:"";position:absolute;inset:0;background:conic-gradient(from 0deg,transparent 0deg,rgba(255,255,200,.25) 15deg,transparent 30deg,transparent 45deg,rgba(255,255,200,.25) 60deg,transparent 75deg,transparent 90deg,rgba(255,255,200,.25) 105deg,transparent 120deg,transparent 135deg,rgba(255,255,200,.25) 150deg,transparent 165deg,transparent 180deg,rgba(255,255,200,.25) 195deg,transparent 210deg,transparent 225deg,rgba(255,255,200,.25) 240deg,transparent 255deg,transparent 270deg,rgba(255,255,200,.25) 285deg,transparent 300deg,transparent 315deg,rgba(255,255,200,.25) 330deg,transparent 345deg)}
    .shop-preview-stun-nova::after{content:"";position:absolute;top:8%;left:18%;width:44%;height:28%;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,0))}
    .shop-owned-block{display:flex;flex-direction:column;align-items:center;gap:clamp(1px,0.4cqw,4px);margin:0;text-align:center;width:100%}
    .shop-owned-label{margin:0;font-size:clamp(.72rem,3.4cqw,.92rem);color:#8c8c8c;line-height:1.1}
    .shop-owned-grid{display:grid;grid-template-rows:repeat(2,auto);grid-auto-flow:column;grid-auto-columns:minmax(0,auto);justify-content:center;align-items:start;justify-items:center;gap:clamp(3px,1cqw,8px);width:100%;max-width:100%;min-height:calc(2 * clamp(36px,11cqw,58px) + clamp(3px,1cqw,8px))}
    .shop-owned-slot{position:relative;width:clamp(36px,11cqw,58px);max-width:100%;touch-action:manipulation}
    .shop-owned-mini{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#050505;border:max(1px,.35cqw) solid #5a5a5a;border-radius:clamp(6px,1.7cqw,12px);box-sizing:border-box;overflow:hidden}
    .shop-owned-count{position:absolute;right:max(-2px,-.35cqw);bottom:max(-2px,-.35cqw);z-index:3;min-width:1.15em;padding:0 clamp(3px,.45cqw,6px);font-size:clamp(.58rem,2.35cqw,.72rem);font-weight:700;line-height:1.25;color:#f0f0f0;background:rgba(18,18,18,.94);border:max(1px,.25cqw) solid #6a6a6a;border-radius:clamp(3px,.6cqw,6px);box-shadow:0 1px 3px rgba(0,0,0,.85);pointer-events:none;box-sizing:border-box;text-align:center}
    .shop-item-desc{display:block;margin:0;font-size:clamp(.78rem,3.35cqw,1rem);color:#909090;line-height:1.18}
    .shop-item-cost{flex:0 0 auto;align-self:center;margin-left:clamp(5px,1.35cqw,10px);font-size:clamp(.7rem,3cqw,.88rem);font-weight:600;color:#eecf40;white-space:nowrap;line-height:1.1;text-shadow:0 1px 2px rgba(0,0,0,.85),0 0 10px rgba(232,192,48,.18);pointer-events:none}
    #mazeCanvas{display:block;width:100%;height:100%;max-width:100%;max-height:100%;touch-action:none}
    .dpad{position:relative;flex:0 0 calc(100% * 210 / 718);padding:4px;display:grid;grid-template-columns:3fr 4fr 3fr;grid-template-rows:1fr;align-items:stretch;gap:4px;min-height:0;background:linear-gradient(180deg,#0a0a0a 0%,#000 100%);border-top:1px solid #333}
    .dpad-center{display:flex;flex-direction:column;min-width:0;min-height:0;gap:4px}
    .dpad-btn{margin:0;padding:0;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:clamp(2rem,10cqw,2.7rem);line-height:1;color:#c0c0c0;background:#121212;border:2px solid #404040;border-radius:10px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:filter .08s ease,border-color .08s ease,background .08s ease}
    .dpad-btn-label{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
    .dpad-cooldown-overlay{position:absolute;inset:4px;border-radius:12px;overflow:hidden;pointer-events:none;z-index:5}
    .dpad-cooldown-fill-global{position:absolute;left:0;right:0;bottom:0;height:100%;width:100%;transform-origin:bottom center;transform:scaleY(0);background:rgba(255,255,255,.14)}
    .dpad.dpad--cooling .dpad-btn{filter:grayscale(.85) brightness(.55);color:#6a6a6a;border-color:#2a2a2a;background:#080808}
    .dpad-btn--side{width:100%;height:100%;min-width:0;min-height:0;align-self:stretch;justify-self:stretch;border-radius:10px}
    .dpad-btn--ns{flex:1 1 0;min-height:0;width:100%}
    .dpad:not(.dpad--cooling) .dpad-btn:active{background:#1f1f1f;border-color:#666}
    .win-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:rgba(0,0,0,.92);backdrop-filter:blur(4px);z-index:10}
    .win-overlay.hidden{display:none}
    .win-title{margin:0;font-size:1.5rem;font-weight:600;color:#e0e0e0}
    .win-btn{min-height:48px;padding:0 28px;font-size:1rem;font-weight:600;color:#0a0a0a;background:#b8b8b8;border:none;border-radius:12px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
    .win-btn:disabled{opacity:.48;cursor:not-allowed;filter:brightness(.9)}
    .shop-panel .win-btn.shop-continue{min-height:clamp(54px,12.5cqw,74px);margin-top:0;padding:0 clamp(12px,4.8cqw,26px);font-size:clamp(.78rem,3.35cqw,.98rem);border-radius:clamp(7px,2cqw,12px)}
    .win-btn:active{filter:brightness(.92)}
    #levelClearOverlay{position:absolute;inset:0;z-index:20;pointer-events:none;display:none;align-items:center;justify-content:center}
    #levelClearOverlay.active{display:flex}
    #levelClearCanvas{position:absolute;inset:0;width:100%;height:100%}
    #levelClearText{position:relative;z-index:1;font-size:clamp(1.6rem,9cqw,2.8rem);font-weight:800;color:#fff;text-shadow:0 0 18px rgba(255,220,80,.9),0 0 40px rgba(255,180,40,.6),0 2px 6px rgba(0,0,0,.8);letter-spacing:.04em;opacity:0;transform:scale(.5);animation:lcPop 400ms ease-out forwards}
    @keyframes lcPop{0%{opacity:0;transform:scale(.5)}30%{opacity:1;transform:scale(1.12)}60%{transform:scale(.97)}100%{opacity:1;transform:scale(1)}}
  </style>
</head>
<body>
<div class="game-shell" id="gameShell">
<div class="maze-area"><div class="coin-counter" id="coinCounter" aria-live="polite">Lv 1/6<br><span class="coin-counter-gold">Gold 0</span></div><canvas id="mazeCanvas" aria-label="Maze"></canvas></div>
<div class="dpad" id="dpadRoot" role="group" aria-label="Move"><div class="dpad-cooldown-overlay" aria-hidden="true"><span class="dpad-cooldown-fill-global"></span></div><button type="button" class="dpad-btn dpad-btn--side" data-dir="west" aria-label="Move left"><span class="dpad-btn-label">◀</span></button><div class="dpad-center"><button type="button" class="dpad-btn dpad-btn--ns" data-dir="north" aria-label="Move up"><span class="dpad-btn-label">▲</span></button><button type="button" class="dpad-btn dpad-btn--ns" data-dir="south" aria-label="Move down"><span class="dpad-btn-label">▼</span></button></div><button type="button" class="dpad-btn dpad-btn--side" data-dir="east" aria-label="Move right"><span class="dpad-btn-label">▶</span></button></div>
<div class="win-overlay hidden" id="winOverlay" aria-hidden="true"><p class="win-title">You escaped</p><button type="button" class="win-btn" id="newMazeBtn">New maze</button></div>
<div class="win-overlay hidden" id="loseOverlay" aria-hidden="true"><p class="win-title">Caught!</p><button type="button" class="win-btn" id="loseNewBtn">New run</button></div>
<div class="win-overlay hidden" id="shopOverlay" aria-hidden="true"><div class="shop-panel" role="dialog" aria-labelledby="shopTitle"><p class="win-title" id="shopTitle">Powerup Shop</p><p class="shop-sub" id="shopGoldLine">Gold: 0</p><div class="shop-owned-block" id="shopOwnedLine" aria-live="polite" aria-atomic="true"></div><div id="shopBuyMount"></div><button type="button" class="win-btn shop-continue" id="shopContinueBtn">Continue</button></div></div>
<div class="win-overlay hidden" id="campaignOverlay" aria-hidden="true"><p class="win-title">You cleared all 6 levels!</p><button type="button" class="win-btn" id="campaignNewRunBtn">New run</button></div>
<div id="levelClearOverlay"><canvas id="levelClearCanvas"></canvas><span id="levelClearText">Level Clear!</span></div>
</div>
<script>
(function () {
  "use strict";

  var N = 1;
  var E = 2;
  var S = 4;
  var W = 8;
  var ALL = N | E | S | W;
  var DIR_MOVE = {
    north: { dr: -1, dc: 0, m: N, o: S },
    south: { dr: 1, dc: 0, m: S, o: N },
    east: { dr: 0, dc: 1, m: E, o: W },
    west: { dr: 0, dc: -1, m: W, o: E },
  };

  var canvas = document.getElementById("mazeCanvas");
  var ctx = canvas.getContext("2d");
  if (ctx && ctx.imageSmoothingEnabled !== undefined) {
    ctx.imageSmoothingEnabled = true;
  }

  var lastCanvasSyncDpr = 0;
  var lastCanvasSyncBw = 0;
  var lastCanvasSyncBh = 0;

  function syncCanvasBackingStore() {
    var dpr = window.devicePixelRatio || 1;
    var cw = canvas.clientWidth;
    var ch = canvas.clientHeight;
    if (cw < 1 || ch < 1) {
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      lastCanvasSyncDpr = 0;
      lastCanvasSyncBw = 0;
      lastCanvasSyncBh = 0;
      return;
    }
    var bw = Math.max(1, Math.round(cw * dpr));
    var bh = Math.max(1, Math.round(ch * dpr));
    if (canvas.width !== bw || canvas.height !== bh) {
      canvas.width = bw;
      canvas.height = bh;
    }
    if (dpr !== lastCanvasSyncDpr || bw !== lastCanvasSyncBw || bh !== lastCanvasSyncBh) {
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      lastCanvasSyncDpr = dpr;
      lastCanvasSyncBw = bw;
      lastCanvasSyncBh = bh;
    }
  }

  function clamp01(t) {
    if (t < 0) {
      return 0;
    }
    if (t > 1) {
      return 1;
    }
    return t;
  }
  var winOverlay = document.getElementById("winOverlay");
  var loseOverlay = document.getElementById("loseOverlay");
  var shopOverlay = document.getElementById("shopOverlay");
  var campaignOverlay = document.getElementById("campaignOverlay");
  var newMazeBtn = document.getElementById("newMazeBtn");
  var loseNewBtn = document.getElementById("loseNewBtn");
  var shopGoldLine = document.getElementById("shopGoldLine");
  var shopOwnedLine = document.getElementById("shopOwnedLine");
  var shopContinueBtn = document.getElementById("shopContinueBtn");
  var shopBuyMount = document.getElementById("shopBuyMount");
  var campaignNewRunBtn = document.getElementById("campaignNewRunBtn");
  var levelClearOverlay = document.getElementById("levelClearOverlay");
  var levelClearCanvas = document.getElementById("levelClearCanvas");
  var levelClearText = document.getElementById("levelClearText");
  var coinCounterEl = document.getElementById("coinCounter");

  var SHOW_SHOP_ON_LOAD = false;

  var MAX_LEVEL = 6;
  var BASE_EGG_INTERVAL_MS = 20000;
  var MIN_EGG_INTERVAL_MS = 2500;
  var FAST_EGG_GAP_MS = 2000;
  var EGG_INTERVAL_PER_LEVEL_MS = 1000;
  var SHOP_PRICE_GOLD = 2;
  var SHOP_OFFER_COUNT = 3;
  var COOLDOWN_MS_BASE = 500;
  var MIN_COOLDOWN_MS = 50;
  var COOLDOWN_MULT_PER_PICKUP = 0.9;
  var MAX_COOLDOWN_PURCHASES = (function () {
    var m = 1;
    while (Math.round(COOLDOWN_MS_BASE * Math.pow(COOLDOWN_MULT_PER_PICKUP, m)) > MIN_COOLDOWN_MS) {
      m++;
    }
    return m;
  })();

  var SHOP_ITEM_DEFS = (function () {
    var rows = [
      [
        "shopBuyCooldown",
        "cooldown",
        "Move Speed",
        '<span class="shop-preview-cooldown"><span class="shop-preview-cd-hand shop-preview-cd-hand--a" aria-hidden="true"></span><span class="shop-preview-cd-hand shop-preview-cd-hand--b" aria-hidden="true"></span></span>',
      ],
      ["shopBuyWall", "wall", "Wall Break", '<span class="shop-preview-wall"></span>'],
      [
        "shopBuyInvuln",
        "invuln",
        "Invincibility",
        '<span class="shop-preview-invuln-wrap"><span class="shop-preview-invuln"></span></span>',
      ],
      ["shopBuyMagnet", "magnet", "Gold Magnet", '<span class="shop-preview-magnet"></span>'],
      ["shopBuyFear", "fear", "Fear", '<span class="shop-preview-fear"></span>'],
      ["shopBuyBanish", "banish", "Banish imp", '<span class="shop-preview-banish"></span>'],
      [
        "shopBuyGoldBurst",
        "goldBurst",
        "Gold Spread",
        '<span class="shop-preview-gold-burst" aria-hidden="true"><span class="shop-preview-gold-coin shop-preview-gold-coin--t"></span><span class="shop-preview-gold-coin shop-preview-gold-coin--bl"></span><span class="shop-preview-gold-coin shop-preview-gold-coin--br"></span></span>',
      ],
      ["shopBuyPhase", "phase", "Phase", '<span class="shop-preview-phase"></span>'],
      ["shopBuyStunNova", "stunNova", "Stun Nova", '<span class="shop-preview-stun-nova"></span>'],
    ];
    var out = [];
    var si;
    for (si = 0; si < rows.length; si++) {
      var z = rows[si];
      var nm = z[2];
      out.push({
        id: z[0],
        type: z[1],
        desc: nm,
        title: nm + " — 2 gold",
        aria: "Buy " + nm + " for 2 gold",
        preview: z[3],
      });
    }
    return out;
  })();

  var SHOP_BUY_SPECS = [];

  function rebuildShopBuyMountOffers() {
    if (!shopBuyMount) {
      return;
    }
    shopBuyMount.innerHTML = "";
    SHOP_BUY_SPECS.length = 0;
    var pool = SHOP_ITEM_DEFS.slice();
    shuffleInPlace(pool);
    var nOffer = Math.min(SHOP_OFFER_COUNT, pool.length);
    var ii;
    for (ii = 0; ii < nOffer; ii++) {
      var it = pool[ii];
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "shop-item-buy";
      btn.id = it.id;
      btn.setAttribute("data-shop-type", it.type);
      btn.title = it.title;
      btn.setAttribute("aria-label", it.aria);
      var pv = document.createElement("span");
      pv.className = "shop-pickup-preview";
      pv.setAttribute("aria-hidden", "true");
      pv.innerHTML = it.preview;
      var main = document.createElement("span");
      main.className = "shop-item-main";
      var desc = document.createElement("span");
      desc.className = "shop-item-desc";
      desc.textContent = it.desc;
      main.appendChild(desc);
      var costLbl = document.createElement("span");
      costLbl.className = "shop-item-cost";
      costLbl.textContent = "Cost: " + SHOP_PRICE_GOLD;
      costLbl.setAttribute("aria-hidden", "true");
      btn.appendChild(pv);
      btn.appendChild(main);
      btn.appendChild(costLbl);
      shopBuyMount.appendChild(btn);
      var specShop = {
        type: it.type,
        el: btn,
      };
      if (it.type === "cooldown") {
        specShop.extraCheck = function () {
          return countOwnedCooldownSlots() < MAX_COOLDOWN_PURCHASES;
        };
      }
      SHOP_BUY_SPECS.push(specShop);
      btn._shopSpec = specShop;
    }
  }

  var currentLevel = 1;
  var goldWallet = 0;
  var shopAfterLevel = 0;
  var cooldownReductionPurchases = 0;
  var wallBreakCharges = 0;
  var invulnerableUntilMs = 0;
  var INVULN_DURATION_MS = 6000;
  var INVULN_WARN_FLASH_MS = 2000;
  var magnetUntilMs = 0;
  var MAGNET_DURATION_MS = 5000;
  var fearUntilMs = 0;
  var FEAR_DURATION_MS = 4000;
  var fearPickupWaveStartMs = 0;
  var phaseUntilMs = 0;
  var PHASE_DURATION_MS = 3000;
  var PHASE_WARN_BLINK_MS = 2000;
  var monsterStunnedUntilMs = 0;
  var STUN_NOVA_RANGE = 3;
  var STUN_NOVA_MS = 7000;
  var lastGameTickMs = 0;
  var MAGNET_PULL_ANIM_MS = 320;
  var GOLD_SPREAD_ANIM_MS = 340;
  var coinPullAnimations = [];
  var ownedPowerups = [];
  var pendingLevelPowerups = [];

  var GOLD_BURST_SPAWN_COUNT = 4;
  var pendingCoinKeys = new Set();
  var playerPickupFlashes = [];
  var FLASH_DURATION_MS = 450;
  var banishImpRings = [];
  var pendingBanishImpCount = 0;
  var BANISH_IMP_RING_MS = 720;

  var rows;
  var cols;
  var cellSize;
  var grid;
  var playerR;
  var playerC;
  var playerGlideActive;
  var playerGlideStartMs;
  var playerGlideFr;
  var playerGlideFc;
  var playerGlideTr;
  var playerGlideTc;
  var PLAYER_GLIDE_MS = 100;
  var bufferedPlayerDir = null;
  var mazeW;
  var mazeH;
  var offsetX;
  var offsetY;

  var monsterR;
  var monsterC;
  var monsterGlideActive;
  var monsterGlideStartMs;
  var monsterGlideFr;
  var monsterGlideFc;
  var monsterGlideTr;
  var monsterGlideTc;
  var monsterChaseQueue = [];
  var monsterFearPreviewCache = null;
  var MONSTER_TILE_MS = 1035;
  var MONSTER_GROW_MS = 2000;
  var monsterGrowStartMs = 0;
  var EGG_HATCH_MS = 3000;
  var EMOJI_ONI = "👹";
  var EMOJI_MINION = "👿";
  var EMOJI_EXIT_LADDER = "\uD83E\uDE9C";
  var EMOJI_PLAYER_KNIGHT = "\u265E";
  var EMOJI_TINT_PLAYER = "#ffffff";
  var EMOJI_TINT_ENEMY = "#e52d2d";
  var EMOJI_TINT_EGG = "#7a7a7a";
  var EMOJI_VISUAL_SCALE = 1.2;
  var EMOJI_DRAW_OFFSET_Y = 5;
  var emojiTintCanvas = null;
  var spawnedEnemies = [];
  var nextEggDropAt = 0;
  var fastEggGapsRemaining = 0;

  function cellKey(r, c) {
    return r + "," + c;
  }

  function getEggIntervalMs() {
    var raw = BASE_EGG_INTERVAL_MS - (currentLevel - 1) * EGG_INTERVAL_PER_LEVEL_MS;
    if (raw < MIN_EGG_INTERVAL_MS) {
      return MIN_EGG_INTERVAL_MS;
    }
    return raw;
  }

  function consumeNextEggDropGapMs() {
    if (fastEggGapsRemaining > 0) {
      fastEggGapsRemaining--;
      return FAST_EGG_GAP_MS;
    }
    return getEggIntervalMs();
  }

  function effectiveCooldownMs() {
    return Math.max(
      MIN_COOLDOWN_MS,
      Math.round(COOLDOWN_MS_BASE * Math.pow(COOLDOWN_MULT_PER_PICKUP, cooldownReductionPurchases)),
    );
  }

  function updateCoinCounterUi() {
    if (!coinCounterEl) {
      return;
    }
    coinCounterEl.innerHTML =
      "Lv " +
      currentLevel +
      "/" +
      MAX_LEVEL +
      '<br><span class="coin-counter-gold">Gold ' +
      goldWallet +
      "</span>";
  }

  function countOwnedCooldownSlots() {
    var n = 0;
    var i;
    for (i = 0; i < ownedPowerups.length; i++) {
      if (ownedPowerups[i].type === "cooldown") {
        n++;
      }
    }
    return n;
  }

  function getOwnedPowerupCounts() {
    var counts = Object.create(null);
    var i;
    for (i = 0; i < ownedPowerups.length; i++) {
      var t = ownedPowerups[i].type;
      counts[t] = (counts[t] || 0) + 1;
    }
    return counts;
  }

  function escapeAttrHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
  }

  function buildShopOwnedPowerupsHtml() {
    var counts = getOwnedPowerupCounts();
    var total = ownedPowerups.length;
    var parts = [];
    parts.push('<div class="shop-owned-label">Powerups spawning per level: ' + total + "</div>");
    parts.push('<div class="shop-owned-grid" role="list">');
    var ii;
    for (ii = 0; ii < SHOP_ITEM_DEFS.length; ii++) {
      var def = SHOP_ITEM_DEFS[ii];
      var c = counts[def.type] || 0;
      if (c < 1) {
        continue;
      }
      var ariaName = def.desc || def.type;
      var ariaFull = ariaName + ", " + c + (c === 1 ? " spawn" : " spawns") + " per level";
      var tip = escapeAttrHtml(def.desc || def.title);
      parts.push(
        '<div class="shop-owned-slot" role="listitem" title="' +
          tip +
          '" aria-label="' +
          escapeAttrHtml(ariaFull) +
          '">' +
          '<div class="shop-owned-mini">' +
          def.preview +
          "</div>" +
          '<span class="shop-owned-count" aria-hidden="true">' +
          c +
          "</span>" +
          "</div>",
      );
    }
    parts.push("</div>");
    return parts.join("");
  }

  var shopBuyLockTimer = null;
  var shopBuyUnlockAtMs = 0;

  function isShopInputLocked() {
    return shopBuyUnlockAtMs > 0 && performance.now() < shopBuyUnlockAtMs;
  }

  function updateShopContinueButtonLabel() {
    if (!shopContinueBtn) {
      return;
    }
    if (shopAfterLevel >= MAX_LEVEL) {
      shopContinueBtn.textContent = "Continue";
    } else {
      var nextLv = shopAfterLevel + 1;
      if (nextLv === MAX_LEVEL) {
        shopContinueBtn.textContent = "Continue to final level";
      } else {
        shopContinueBtn.textContent = "Continue to level " + nextLv;
      }
    }
  }

  function updateShopUi() {
    if (shopGoldLine) {
      shopGoldLine.textContent = "Gold: " + goldWallet;
    }
    if (shopOwnedLine) {
      shopOwnedLine.innerHTML = buildShopOwnedPowerupsHtml();
    }
    var canBuy = goldWallet >= SHOP_PRICE_GOLD;
    var buyInputLocked = isShopInputLocked();
    var si;
    for (si = 0; si < SHOP_BUY_SPECS.length; si++) {
      var sb = SHOP_BUY_SPECS[si];
      if (sb.el) {
        sb.el.disabled = buyInputLocked || !canBuy || (sb.extraCheck ? !sb.extraCheck() : false);
      }
    }
    if (shopContinueBtn) {
      updateShopContinueButtonLabel();
      shopContinueBtn.disabled = buyInputLocked;
    }
  }

  function setOverlayHidden(el, hidden) {
    if (!el) {
      return;
    }
    el.classList.toggle("hidden", hidden);
    el.setAttribute("aria-hidden", hidden ? "true" : "false");
  }

  function clearShopBuyLock() {
    if (shopBuyLockTimer !== null) {
      clearTimeout(shopBuyLockTimer);
      shopBuyLockTimer = null;
    }
    shopBuyUnlockAtMs = 0;
  }

  function clearShopContinueDisabled() {
    if (shopContinueBtn) {
      shopContinueBtn.disabled = false;
    }
  }

  function hideAllGameOverlays() {
    clearShopBuyLock();
    clearShopContinueDisabled();
    setOverlayHidden(winOverlay, true);
    setOverlayHidden(loseOverlay, true);
    setOverlayHidden(shopOverlay, true);
    setOverlayHidden(campaignOverlay, true);
  }

  function showShopOverlay() {
    clearShopBuyLock();
    rebuildShopBuyMountOffers();
    setOverlayHidden(shopOverlay, false);
    shopBuyUnlockAtMs = performance.now() + 400;
    updateShopUi();
    shopBuyLockTimer = setTimeout(function () {
      shopBuyLockTimer = null;
      shopBuyUnlockAtMs = 0;
      if (!shopOverlay.classList.contains("hidden")) {
        updateShopUi();
      }
    }, 400);
  }

  function hideShopOverlay() {
    clearShopBuyLock();
    clearShopContinueDisabled();
    setOverlayHidden(shopOverlay, true);
  }

  function showCampaignOverlay() {
    setOverlayHidden(campaignOverlay, false);
  }

  function hideCampaignOverlay() {
    setOverlayHidden(campaignOverlay, true);
  }

  function scatterOwnedPowerupsOnLevel() {
    pendingLevelPowerups = [];
    if (!ownedPowerups.length) {
      return;
    }
    var pool = [];
    var br;
    var bc;
    for (br = 0; br < rows; br++) {
      for (bc = 0; bc < cols; bc++) {
        if (br === 0 && bc === 0) {
          continue;
        }
        if (br === rows - 1 && bc === cols - 1) {
          continue;
        }
        var k = cellKey(br, bc);
        if (pendingCoinKeys.has(k)) {
          continue;
        }
        pool.push([br, bc]);
      }
    }
    shuffleInPlace(pool);
    var ii;
    var nPlace = Math.min(ownedPowerups.length, pool.length);
    for (ii = 0; ii < nPlace; ii++) {
      pendingLevelPowerups.push({
        r: pool[ii][0],
        c: pool[ii][1],
        type: ownedPowerups[ii].type,
      });
    }
  }

  function addPickupFlash(type, now) {
    playerPickupFlashes.push({ type: type, startMs: now });
  }

  var POWERUP_APPLY = {
    cooldown: function (now) {
      if (cooldownReductionPurchases < MAX_COOLDOWN_PURCHASES) {
        cooldownReductionPurchases++;
      }
      addPickupFlash("cooldown", now);
    },
    wall: function (now) {
      wallBreakCharges++;
      addPickupFlash("wall", now);
    },
    invuln: function (now) {
      invulnerableUntilMs = now + INVULN_DURATION_MS;
    },
    magnet: function (now) {
      magnetUntilMs = now + MAGNET_DURATION_MS;
    },
    fear: function (now) {
      fearUntilMs = now + FEAR_DURATION_MS;
      fearPickupWaveStartMs = now;
      monsterFearPreviewCache = null;
      clearMinionPlannedPathsForFear();
    },
    banish: function (now) {
      if (!banishOneRandomMinion(now)) {
        pendingBanishImpCount++;
      }
      addPickupFlash("banish", now);
    },
    goldBurst: function (now) {
      spawnExtraGoldPickups(GOLD_BURST_SPAWN_COUNT, now);
      addPickupFlash("goldBurst", now);
    },
    phase: function (now) {
      phaseUntilMs = now + PHASE_DURATION_MS;
    },
    stunNova: function (now) {
      applyOrthogonalStunNova(now);
      addPickupFlash("stunNova", now);
    },
  };

  function tryCollectPowerupAtPlayer() {
    var pi;
    for (pi = pendingLevelPowerups.length - 1; pi >= 0; pi--) {
      var pu = pendingLevelPowerups[pi];
      if (pu.r === playerR && pu.c === playerC) {
        pendingLevelPowerups.splice(pi, 1);
        var nowPu = performance.now();
        var fn = POWERUP_APPLY[pu.type];
        if (fn) {
          fn(nowPu);
        }
        return;
      }
    }
  }

  function cellHasPendingPowerupAt(r, c) {
    var pi;
    for (pi = 0; pi < pendingLevelPowerups.length; pi++) {
      var p = pendingLevelPowerups[pi];
      if (p.r === r && p.c === c) {
        return true;
      }
    }
    return false;
  }

  function spawnExtraGoldPickups(count, spreadAnimAtMs) {
    var pool = [];
    var br;
    var bc;
    for (br = 0; br < rows; br++) {
      for (bc = 0; bc < cols; bc++) {
        if (br === rows - 1 && bc === cols - 1) {
          continue;
        }
        var k = cellKey(br, bc);
        if (pendingCoinKeys.has(k)) {
          continue;
        }
        if (cellHasPendingPowerupAt(br, bc)) {
          continue;
        }
        if (cellReservedByPullAnim(br, bc)) {
          continue;
        }
        pool.push([br, bc]);
      }
    }
    shuffleInPlace(pool);
    var nAdd = Math.min(count, pool.length);
    var ci;
    for (ci = 0; ci < nAdd; ci++) {
      var pr = pool[ci][0];
      var pc = pool[ci][1];
      if (spreadAnimAtMs != null) {
        coinPullAnimations.push({
          spreadFromPlayer: true,
          er: pr,
          ec: pc,
          startMs: spreadAnimAtMs,
          durationMs: GOLD_SPREAD_ANIM_MS,
        });
      } else {
        pendingCoinKeys.add(cellKey(pr, pc));
      }
    }
    updateCoinCounterUi();
  }

  function applyOrthogonalStunNova(now) {
    var endMs = now + STUN_NOVA_MS;
    function cellInStunNovaArea(r, c) {
      var dr = Math.abs(r - playerR);
      var dc = Math.abs(c - playerC);
      var m = dr + dc;
      if (m > STUN_NOVA_RANGE) {
        return false;
      }
      if (m === STUN_NOVA_RANGE && (dr === 0 || dc === 0)) {
        return false;
      }
      return true;
    }
    if (cellInStunNovaArea(monsterR, monsterC)) {
      monsterStunnedUntilMs = endMs;
      monsterChaseQueue.length = 0;
    }
    var ei;
    for (ei = 0; ei < spawnedEnemies.length; ei++) {
      var ent = spawnedEnemies[ei];
      if (ent.kind === "egg") {
        if (cellInStunNovaArea(ent.cellR, ent.cellC)) {
          ent.stunnedUntilMs = endMs;
        }
      } else if (ent.kind === "minion") {
        if (cellInStunNovaArea(ent.r, ent.c)) {
          ent.stunnedUntilMs = endMs;
        }
      }
    }
  }

  function banishMinionAtIndex(nowMs, idx) {
    var ent = spawnedEnemies[idx];
    if (!ent || ent.kind !== "minion") {
      return;
    }
    var q = getMinionPixelPos(ent, nowMs);
    if (nowMs < ent.stunnedUntilMs) {
      var msh = stunShakePixelOffset(nowMs + ent.r * 47 + ent.c * 31);
      q.x += msh.x;
      q.y += msh.y;
    }
    banishImpRings.push({ startMs: nowMs, x: q.x, y: q.y });
    spawnedEnemies.splice(idx, 1);
  }

  function banishOneRandomMinion(nowMs) {
    var idxs = [];
    var i;
    for (i = 0; i < spawnedEnemies.length; i++) {
      if (spawnedEnemies[i].kind === "minion") {
        idxs.push(i);
      }
    }
    if (!idxs.length) {
      return false;
    }
    var pick = idxs[(Math.random() * idxs.length) | 0];
    banishMinionAtIndex(nowMs, pick);
    return true;
  }

  function clearMinionPlannedPathsForFear() {
    var mi;
    for (mi = 0; mi < spawnedEnemies.length; mi++) {
      var ent = spawnedEnemies[mi];
      if (ent.kind === "minion") {
        ent.plannedCells = [];
      }
    }
  }

  function onPlayerArrivedOnTile(now) {
    if (!gameActive()) {
      return;
    }
    tryCollectCoinAtPlayer();
    tryCollectPowerupAtPlayer();
    if (hitboxesOverlap(now)) {
      triggerLose();
      return;
    }
    if (playerR === rows - 1 && playerC === cols - 1) {
      onLevelComplete();
    }
  }

  function hasInternalWallInDir(r, c, dir) {
    var d = DIR_MOVE[dir];
    if (!d) {
      return false;
    }
    var nr = r + d.dr;
    var nc = c + d.dc;
    if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) {
      return false;
    }
    return !!(grid[r][c] & d.m);
  }

  function canBufferDir(dir) {
    if (canStepFrom(playerR, playerC, dir)) {
      return true;
    }
    var nb = neighborCell(playerR, playerC, dir);
    if (nb.r < 0 || nb.r >= rows || nb.c < 0 || nb.c >= cols) {
      return false;
    }
    return wallBreakCharges > 0 && hasInternalWallInDir(playerR, playerC, dir);
  }

  function tryOpenInternalWallForPlayer(r, c, dir) {
    var d = DIR_MOVE[dir];
    if (!d) {
      return false;
    }
    var nr = r + d.dr;
    var nc = c + d.dc;
    if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) {
      return false;
    }
    if (!(grid[r][c] & d.m)) {
      return false;
    }
    grid[r][c] &= ~d.m;
    grid[nr][nc] &= ~d.o;
    monsterFearPreviewCache = null;
    if (performance.now() < fearUntilMs) {
      clearMinionPlannedPathsForFear();
    }
    return true;
  }

  function neighborCell(r, c, dir) {
    var d = DIR_MOVE[dir];
    if (!d) {
      return { r: r, c: c };
    }
    return { r: r + d.dr, c: c + d.dc };
  }

  function goldPickupsForLevel(level) {
    if (level <= 1) {
      return 10;
    }
    return 10 + 2 * level;
  }

  function scatterCoins() {
    coinPullAnimations.length = 0;
    pendingCoinKeys.clear();
    var pool = [];
    var br;
    var bc;
    for (br = 0; br < rows; br++) {
      for (bc = 0; bc < cols; bc++) {
        if (br === 0 && bc === 0) {
          continue;
        }
        if (br === rows - 1 && bc === cols - 1) {
          continue;
        }
        pool.push([br, bc]);
      }
    }
    shuffleInPlace(pool);
    var ci;
    var nGold = goldPickupsForLevel(currentLevel);
    for (ci = 0; ci < nGold && ci < pool.length; ci++) {
      pendingCoinKeys.add(cellKey(pool[ci][0], pool[ci][1]));
    }
    updateCoinCounterUi();
  }

  function tryCollectCoinAtPlayer() {
    var k = cellKey(playerR, playerC);
    if (!pendingCoinKeys.has(k)) {
      return;
    }
    pendingCoinKeys.delete(k);
    goldWallet++;
    updateCoinCounterUi();
  }

  function magnetReachDistFromPlayer() {
    var dist = Object.create(null);
    var q = [];
    var pr = playerR;
    var pc = playerC;
    dist[cellKey(pr, pc)] = 0;
    q.push([pr, pc, 0]);
    var qi = 0;
    while (qi < q.length) {
      var cur = q[qi++];
      var r = cur[0];
      var c = cur[1];
      var d = cur[2];
      if (d >= 3) {
        continue;
      }
      var nbs = walkNeighbors(r, c);
      var ni;
      for (ni = 0; ni < nbs.length; ni++) {
        var nr = nbs[ni][0];
        var nc = nbs[ni][1];
        var nk = cellKey(nr, nc);
        if (dist[nk] !== undefined) {
          continue;
        }
        dist[nk] = d + 1;
        q.push([nr, nc, d + 1]);
      }
    }
    return dist;
  }

  function magnetFirstNeighborOneCloser(r, c, distMap, distFromPlayer) {
    var want = distFromPlayer - 1;
    var nbs = walkNeighbors(r, c);
    var ni;
    for (ni = 0; ni < nbs.length; ni++) {
      var nr = nbs[ni][0];
      var nc = nbs[ni][1];
      if (distMap[cellKey(nr, nc)] === want) {
        return { r: nr, c: nc };
      }
    }
    return null;
  }

  function cellReservedByPullAnim(er, ec) {
    var ai;
    for (ai = 0; ai < coinPullAnimations.length; ai++) {
      var ap = coinPullAnimations[ai];
      if (ap.er === er && ap.ec === ec) {
        return true;
      }
    }
    return false;
  }

  function tickMagnetGoldVisuals(now) {
    var ai = 0;
    while (ai < coinPullAnimations.length) {
      var a = coinPullAnimations[ai];
      if (now < a.startMs + a.durationMs) {
        ai++;
        continue;
      }
      coinPullAnimations.splice(ai, 1);
      if (a.absorbPlayer) {
        goldWallet++;
        updateCoinCounterUi();
      } else {
        var ek = cellKey(a.er, a.ec);
        if (a.er === playerR && a.ec === playerC) {
          goldWallet++;
          updateCoinCounterUi();
        } else {
          pendingCoinKeys.add(ek);
        }
      }
    }
  }

  function applyMagnetGoldPull(now) {
    tickMagnetGoldVisuals(now);
    if (now >= magnetUntilMs || !gameActive()) {
      return;
    }
    var distMap = magnetReachDistFromPlayer();
    var absorbKeys = [];
    var pullOps = [];
    var pullDestUsed = Object.create(null);
    pendingCoinKeys.forEach(function (k) {
      var comma = k.indexOf(",");
      var cr = parseInt(k.slice(0, comma), 10);
      var cc = parseInt(k.slice(comma + 1), 10);
      var dk = distMap[k];
      if (dk === 1) {
        absorbKeys.push(k);
      } else if (dk === 2 || dk === 3) {
        var nxt = magnetFirstNeighborOneCloser(cr, cc, distMap, dk);
        if (!nxt) {
          return;
        }
        var destK = cellKey(nxt.r, nxt.c);
        if (
          pendingCoinKeys.has(destK) ||
          cellReservedByPullAnim(nxt.r, nxt.c) ||
          pullDestUsed[destK]
        ) {
          return;
        }
        pullDestUsed[destK] = true;
        pullOps.push({
          k: k,
          sr: cr,
          sc: cc,
          er: nxt.r,
          ec: nxt.c,
        });
      }
    });
    var bi;
    for (bi = 0; bi < absorbKeys.length; bi++) {
      var kAbs = absorbKeys[bi];
      if (!pendingCoinKeys.has(kAbs)) {
        continue;
      }
      pendingCoinKeys.delete(kAbs);
      var ca = kAbs.indexOf(",");
      var r1 = parseInt(kAbs.slice(0, ca), 10);
      var c1 = parseInt(kAbs.slice(ca + 1), 10);
      coinPullAnimations.push({
        sr: r1,
        sc: c1,
        er: playerR,
        ec: playerC,
        startMs: now,
        durationMs: MAGNET_PULL_ANIM_MS,
        absorbPlayer: true,
      });
    }
    for (bi = 0; bi < pullOps.length; bi++) {
      var pb = pullOps[bi];
      if (!pendingCoinKeys.has(pb.k)) {
        continue;
      }
      pendingCoinKeys.delete(pb.k);
      coinPullAnimations.push({
        sr: pb.sr,
        sc: pb.sc,
        er: pb.er,
        ec: pb.ec,
        startMs: now,
        durationMs: MAGNET_PULL_ANIM_MS,
      });
    }
  }

  function gameActive() {
    return (
      winOverlay.classList.contains("hidden") &&
      loseOverlay.classList.contains("hidden") &&
      shopOverlay.classList.contains("hidden") &&
      campaignOverlay.classList.contains("hidden")
    );
  }

  function tileCenterPixel(tc, tr) {
    return {
      x: offsetX + (tc + 0.5) * cellSize,
      y: offsetY + (tr + 0.5) * cellSize,
    };
  }

  function getMonsterPixelPos(now) {
    if (monsterGlideActive) {
      var u = (now - monsterGlideStartMs) / MONSTER_TILE_MS;
      if (u < 0) u = 0;
      if (u > 1) u = 1;
      var a = tileCenterPixel(monsterGlideFc, monsterGlideFr);
      var b = tileCenterPixel(monsterGlideTc, monsterGlideTr);
      return { x: a.x + (b.x - a.x) * u, y: a.y + (b.y - a.y) * u };
    }
    return tileCenterPixel(monsterC, monsterR);
  }

  function pixelCellFromPixel(px, py) {
    var cc = Math.floor((px - offsetX) / cellSize);
    var rr = Math.floor((py - offsetY) / cellSize);
    if (rr < 0) rr = 0;
    if (rr >= rows) rr = rows - 1;
    if (cc < 0) cc = 0;
    if (cc >= cols) cc = cols - 1;
    return { r: rr, c: cc };
  }

  function getMinionPixelPos(m, now) {
    if (m.glideActive) {
      var u = (now - m.glideStartMs) / MONSTER_TILE_MS;
      if (u < 0) u = 0;
      if (u > 1) u = 1;
      var a = tileCenterPixel(m.fc, m.fr);
      var b = tileCenterPixel(m.tc, m.tr);
      return { x: a.x + (b.x - a.x) * u, y: a.y + (b.y - a.y) * u };
    }
    return tileCenterPixel(m.c, m.r);
  }

  function getPlayerPixelPos(now) {
    if (playerGlideActive) {
      var praw = (now - playerGlideStartMs) / PLAYER_GLIDE_MS;
      if (praw < 0) praw = 0;
      if (praw > 1) praw = 1;
      var pu = praw * praw * (3 - 2 * praw);
      var pfr = playerGlideFr + (playerGlideTr - playerGlideFr) * pu;
      var pfc = playerGlideFc + (playerGlideTc - playerGlideFc) * pu;
      return {
        x: offsetX + (pfc + 0.5) * cellSize,
        y: offsetY + (pfr + 0.5) * cellSize,
      };
    }
    return tileCenterPixel(playerC, playerR);
  }

  function playerHitRadius() {
    return cellSize * 0.32;
  }

  function monsterHitRadius() {
    return cellSize * 0.3;
  }

  function monsterGrowProgress(now) {
    var t = (now - monsterGrowStartMs) / MONSTER_GROW_MS;
    if (t < 0) {
      t = 0;
    }
    if (t > 1) {
      t = 1;
    }
    return t;
  }

  function monsterEffectiveHitRadius(now) {
    return monsterHitRadius() * monsterGrowProgress(now);
  }

  function enemyEmojiRadiusFromDrawFontPx(fontPx) {
    return fontPx / (2.45 * EMOJI_VISUAL_SCALE);
  }

  function minionCollisionRadiusPx() {
    return enemyEmojiRadiusFromDrawFontPx(cellSize * 0.64 * EMOJI_VISUAL_SCALE);
  }

  function hitboxesOverlap(now) {
    if (now < invulnerableUntilMs) {
      return false;
    }
    var p = getPlayerPixelPos(now);
    var rp = playerHitRadius();
    var rm = monsterEffectiveHitRadius(now);
    var sum = rp + rm;
    var sumSq = sum * sum;
    var m = getMonsterPixelPos(now);
    if (now < monsterStunnedUntilMs) {
      var oniSh = stunShakePixelOffset(now);
      m.x += oniSh.x;
      m.y += oniSh.y;
    }
    var dx = p.x - m.x;
    var dy = p.y - m.y;
    if (dx * dx + dy * dy <= sumSq) {
      return true;
    }
    var rImp = minionCollisionRadiusPx();
    var sumImp = rp + rImp;
    var sumImpSq = sumImp * sumImp;
    var i;
    for (i = 0; i < spawnedEnemies.length; i++) {
      var e = spawnedEnemies[i];
      if (e.hurtsPlayer === false) {
        continue;
      }
      if (e.kind !== "minion") {
        continue;
      }
      var q = getMinionPixelPos(e, now);
      if (now < e.stunnedUntilMs) {
        var msh = stunShakePixelOffset(now + e.r * 47 + e.c * 31);
        q.x += msh.x;
        q.y += msh.y;
      }
      dx = p.x - q.x;
      dy = p.y - q.y;
      if (dx * dx + dy * dy <= sumImpSq) {
        return true;
      }
    }
    return false;
  }

  function triggerLose() {
    setOverlayHidden(loseOverlay, false);
  }

  function walkNeighborsInGrid(g, rr, cc, r, c) {
    var out = [];
    var w = g[r][c];
    if (!(w & N) && r > 0) out.push([r - 1, c]);
    if (!(w & E) && c < cc - 1) out.push([r, c + 1]);
    if (!(w & S) && r < rr - 1) out.push([r + 1, c]);
    if (!(w & W) && c > 0) out.push([r, c - 1]);
    return out;
  }

  function walkNeighbors(r, c) {
    return walkNeighborsInGrid(grid, rows, cols, r, c);
  }

  function minionNeighborChoices(r, c, fromR, fromC) {
    var nbs = walkNeighbors(r, c);
    var filtered = nbs;
    if (fromR >= 0) {
      filtered = nbs.filter(function (nb) {
        return nb[0] !== fromR || nb[1] !== fromC;
      });
    }
    if (!filtered.length) {
      filtered = nbs;
    }
    return filtered.slice();
  }

  var MIN_MINION_PLAN_LEN = 8;
  var MINION_PREVIEW_EDGES = 3;

  function rollRandomForwardSteps(startR, startC, fromR, fromC, edgeCount) {
    var out = [];
    var cr = startR;
    var cc = startC;
    var fr = fromR;
    var fc = fromC;
    var i;
    for (i = 0; i < edgeCount; i++) {
      var nbs = minionNeighborChoices(cr, cc, fr, fc);
      if (!nbs.length) {
        break;
      }
      shuffleInPlace(nbs);
      var pick = nbs[0];
      out.push({ r: pick[0], c: pick[1] });
      fr = cr;
      fc = cc;
      cr = pick[0];
      cc = pick[1];
    }
    return out;
  }

  function replenishMinionPlannedPath(m, minLen, now) {
    if (now === undefined || now === null) {
      now = performance.now();
    }
    var feared = now < fearUntilMs;
    var fleeDist = feared ? fullBfsDistFromPlayer() : null;
    var safety = 0;
    while (m.plannedCells.length < minLen && safety++ < 24) {
      var startR;
      var startC;
      var fromR;
      var fromC;
      var L = m.plannedCells.length;
      if (L === 0) {
        startR = m.r;
        startC = m.c;
        fromR = m.fromR;
        fromC = m.fromC;
      } else {
        var last = m.plannedCells[L - 1];
        startR = last.r;
        startC = last.c;
        if (L >= 2) {
          var prev = m.plannedCells[L - 2];
          fromR = prev.r;
          fromC = prev.c;
        } else {
          fromR = m.r;
          fromC = m.c;
        }
      }
      var rolled = feared
        ? rollFleeForwardSteps(startR, startC, fromR, fromC, 12, fleeDist)
        : rollRandomForwardSteps(startR, startC, fromR, fromC, 12);
      if (!rolled.length) {
        break;
      }
      var ri;
      for (ri = 0; ri < rolled.length; ri++) {
        m.plannedCells.push(rolled[ri]);
      }
    }
  }

  function minionPlanTargetValid(r, c, fromR, fromC, tr, tc) {
    var choices = minionNeighborChoices(r, c, fromR, fromC);
    var ci;
    for (ci = 0; ci < choices.length; ci++) {
      if (choices[ci][0] === tr && choices[ci][1] === tc) {
        return true;
      }
    }
    return false;
  }

  function buildMinionPreviewSegs(minion, nowMs) {
    replenishMinionPlannedPath(minion, MIN_MINION_PLAN_LEN, nowMs);
    var p = minion.plannedCells;
    var segs = [];
    function pushEdge(r0, c0, r1, c1) {
      segs.push({
        x0: offsetX + c0 * cellSize + cellSize / 2,
        y0: offsetY + r0 * cellSize + cellSize / 2,
        x1: offsetX + c1 * cellSize + cellSize / 2,
        y1: offsetY + r1 * cellSize + cellSize / 2,
      });
    }
    if (minion.glideActive) {
      var mpos = getMinionPixelPos(minion, nowMs);
      var glideEnd = tileCenterPixel(minion.tc, minion.tr);
      segs.push({
        x0: mpos.x,
        y0: mpos.y,
        x1: glideEnd.x,
        y1: glideEnd.y,
      });
      var ei;
      for (ei = 0; ei < MINION_PREVIEW_EDGES && ei + 1 < p.length; ei++) {
        pushEdge(p[ei].r, p[ei].c, p[ei + 1].r, p[ei + 1].c);
      }
    } else {
      var prevR = minion.r;
      var prevC = minion.c;
      var ek;
      for (ek = 0; ek < MINION_PREVIEW_EDGES && ek < p.length; ek++) {
        pushEdge(prevR, prevC, p[ek].r, p[ek].c);
        prevR = p[ek].r;
        prevC = p[ek].c;
      }
    }
    return segs;
  }

  function strokeRedPreviewLine(ctx, previewSegs, hx, hy, hidePreviewRSq) {
    if (!previewSegs.length) {
      return;
    }
    var previewSubs = 5;
    ctx.save();
    ctx.strokeStyle = "rgba(210, 35, 45, 0.82)";
    ctx.lineWidth = Math.max(2, cellSize * 0.065);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.beginPath();
    var penDown = false;
    var si;
    for (si = 0; si < previewSegs.length; si++) {
      var sg = previewSegs[si];
      var x0 = sg.x0;
      var y0 = sg.y0;
      var x1 = sg.x1;
      var y1 = sg.y1;
      var s;
      for (s = 0; s < previewSubs; s++) {
        var u0 = s / previewSubs;
        var u1 = (s + 1) / previewSubs;
        var ax = x0 + (x1 - x0) * u0;
        var ay = y0 + (y1 - y0) * u0;
        var bx = x0 + (x1 - x0) * u1;
        var by = y0 + (y1 - y0) * u1;
        var dax = ax - hx;
        var day = ay - hy;
        var dbx = bx - hx;
        var dby = by - hy;
        if (dax * dax + day * day <= hidePreviewRSq && dbx * dbx + dby * dby <= hidePreviewRSq) {
          penDown = false;
          continue;
        }
        if (!penDown) {
          ctx.moveTo(ax, ay);
          penDown = true;
        }
        ctx.lineTo(bx, by);
      }
    }
    ctx.stroke();
    ctx.restore();
  }

  function shortestPath(sr, sc, tr, tc) {
    if (sr === tr && sc === tc) {
      return [{ r: sr, c: sc }];
    }
    var parent = {};
    var vis = {};
    var q = [[sr, sc]];
    vis[cellKey(sr, sc)] = true;
    var qi = 0;
    while (qi < q.length) {
      var cur = q[qi++];
      var cr = cur[0];
      var cc = cur[1];
      var nbs = walkNeighbors(cr, cc);
      var ni;
      for (ni = 0; ni < nbs.length; ni++) {
        var nb = nbs[ni];
        var nr = nb[0];
        var nc = nb[1];
        var k = cellKey(nr, nc);
        if (vis[k]) continue;
        vis[k] = true;
        parent[k] = [cr, cc];
        if (nr === tr && nc === tc) {
          var path = [];
          var pr = tr;
          var pc = tc;
          while (true) {
            path.push({ r: pr, c: pc });
            if (pr === sr && pc === sc) break;
            var p = parent[cellKey(pr, pc)];
            pr = p[0];
            pc = p[1];
          }
          path.reverse();
          return path;
        }
        q.push([nr, nc]);
      }
    }
    return [{ r: sr, c: sc }];
  }

  function monsterAdjacentStepValid(fromR, fromC, toR, toC) {
    var nbs = walkNeighbors(fromR, fromC);
    var ni;
    for (ni = 0; ni < nbs.length; ni++) {
      if (nbs[ni][0] === toR && nbs[ni][1] === toC) {
        return true;
      }
    }
    return false;
  }

  function buildMonsterChasePreviewPath(fromR, fromC) {
    if (monsterChaseQueue.length === 0) {
      return shortestPath(fromR, fromC, playerR, playerC);
    }
    var out = [{ r: fromR, c: fromC }];
    var qi;
    for (qi = 0; qi < monsterChaseQueue.length; qi++) {
      out.push({ r: monsterChaseQueue[qi].r, c: monsterChaseQueue[qi].c });
    }
    var lq = monsterChaseQueue[monsterChaseQueue.length - 1];
    var rest = shortestPath(lq.r, lq.c, playerR, playerC);
    if (rest.length >= 2) {
      var ri;
      for (ri = 1; ri < rest.length; ri++) {
        out.push({ r: rest[ri].r, c: rest[ri].c });
      }
    }
    return out;
  }

  function fullBfsDistFromPlayer() {
    var dist = Object.create(null);
    var q = [];
    var pr = playerR;
    var pc = playerC;
    dist[cellKey(pr, pc)] = 0;
    q.push([pr, pc]);
    var qi = 0;
    while (qi < q.length) {
      var cur = q[qi++];
      var r = cur[0];
      var c = cur[1];
      var base = dist[cellKey(r, c)];
      var nbs = walkNeighbors(r, c);
      var ni;
      for (ni = 0; ni < nbs.length; ni++) {
        var nr = nbs[ni][0];
        var nc = nbs[ni][1];
        var nk = cellKey(nr, nc);
        if (dist[nk] !== undefined) {
          continue;
        }
        dist[nk] = base + 1;
        q.push([nr, nc]);
      }
    }
    return dist;
  }

  function pickFleeCellFromNeighbors(nbs, distMap, fromR, fromC) {
    var bestD = -1;
    var bestPick = null;
    var bestBacktrack = 1;
    var j;
    for (j = 0; j < nbs.length; j++) {
      var nr = nbs[j][0];
      var nc = nbs[j][1];
      var d = distMap[cellKey(nr, nc)];
      if (d === undefined) {
        continue;
      }
      var isBacktrack = fromR >= 0 && fromC >= 0 && nr === fromR && nc === fromC ? 1 : 0;
      if (d > bestD || (d === bestD && isBacktrack < bestBacktrack)) {
        bestD = d;
        bestBacktrack = isBacktrack;
        bestPick = [nr, nc];
      }
    }
    return bestPick;
  }

  function pickMonsterFleeStep(fr, fc, distMap) {
    var pick = pickFleeCellFromNeighbors(walkNeighbors(fr, fc), distMap);
    if (!pick) {
      return null;
    }
    return { r: pick[0], c: pick[1] };
  }

  function buildMonsterFleePreviewPath(fromR, fromC, maxEdges) {
    var distMap = fullBfsDistFromPlayer();
    var path = [{ r: fromR, c: fromC }];
    var cr = fromR;
    var cc = fromC;
    var e;
    for (e = 0; e < maxEdges; e++) {
      var nxt = pickMonsterFleeStep(cr, cc, distMap);
      if (!nxt) {
        break;
      }
      path.push(nxt);
      cr = nxt.r;
      cc = nxt.c;
    }
    return path;
  }

  function getMonsterFleePreviewPath(fromR, fromC, maxEdges) {
    var cache = monsterFearPreviewCache;
    if (
      cache &&
      cache.fromR === fromR &&
      cache.fromC === fromC &&
      cache.playerR === playerR &&
      cache.playerC === playerC &&
      cache.maxEdges === maxEdges
    ) {
      return cache.path;
    }
    var path = buildMonsterFleePreviewPath(fromR, fromC, maxEdges);
    monsterFearPreviewCache = {
      fromR: fromR,
      fromC: fromC,
      playerR: playerR,
      playerC: playerC,
      maxEdges: maxEdges,
      path: path,
    };
    return path;
  }

  function rollFleeForwardSteps(startR, startC, fromR, fromC, edgeCount, distMap) {
    var out = [];
    var cr = startR;
    var cc = startC;
    var fr = fromR;
    var fc = fromC;
    var i;
    for (i = 0; i < edgeCount; i++) {
      var nbs = minionNeighborChoices(cr, cc, fr, fc);
      if (!nbs.length) {
        break;
      }
      var pick = pickFleeCellFromNeighbors(nbs, distMap, fr, fc);
      if (!pick) {
        break;
      }
      out.push({ r: pick[0], c: pick[1] });
      fr = cr;
      fc = cc;
      cr = pick[0];
      cc = pick[1];
    }
    return out;
  }

  function shuffleInPlace(arr) {
    var i = arr.length;
    while (i > 1) {
      var j = (Math.random() * i) | 0;
      i--;
      var t = arr[i];
      arr[i] = arr[j];
      arr[j] = t;
    }
    return arr;
  }

  function generateMaze(r, c) {
    var g = [];
    var vis = [];
    var ri;
    for (ri = 0; ri < r; ri++) {
      g.push([]);
      vis.push([]);
      var ci;
      for (ci = 0; ci < c; ci++) {
        g[ri].push(ALL);
        vis[ri].push(false);
      }
    }

    var stack = [[0, 0]];
    vis[0][0] = true;

    while (stack.length) {
      var top = stack[stack.length - 1];
      var cr = top[0];
      var cc = top[1];
      var nbs = [];

      if (cr > 0 && !vis[cr - 1][cc]) {
        nbs.push({ nr: cr - 1, nc: cc, curMask: N, neighMask: S });
      }
      if (cc < c - 1 && !vis[cr][cc + 1]) {
        nbs.push({ nr: cr, nc: cc + 1, curMask: E, neighMask: W });
      }
      if (cr < r - 1 && !vis[cr + 1][cc]) {
        nbs.push({ nr: cr + 1, nc: cc, curMask: S, neighMask: N });
      }
      if (cc > 0 && !vis[cr][cc - 1]) {
        nbs.push({ nr: cr, nc: cc - 1, curMask: W, neighMask: E });
      }

      if (nbs.length) {
        shuffleInPlace(nbs);
        var nb = nbs[0];
        g[cr][cc] &= ~nb.curMask;
        g[nb.nr][nb.nc] &= ~nb.neighMask;
        vis[nb.nr][nb.nc] = true;
        stack.push([nb.nr, nb.nc]);
      } else {
        stack.pop();
      }
    }

    return g;
  }

  function listClosedInternalWalls(g, r, c) {
    var list = [];
    var ri;
    var ci;
    for (ri = 0; ri < r; ri++) {
      for (ci = 0; ci < c; ci++) {
        if (ci < c - 1 && g[ri][ci] & E) {
          list.push({ ri: ri, ci: ci, ax: "E" });
        }
        if (ri < r - 1 && g[ri][ci] & S) {
          list.push({ ri: ri, ci: ci, ax: "S" });
        }
      }
    }
    return list;
  }

  function openWallEdge(g, w) {
    if (w.ax === "E") {
      g[w.ri][w.ci] &= ~E;
      g[w.ri][w.ci + 1] &= ~W;
    } else {
      g[w.ri][w.ci] &= ~S;
      g[w.ri + 1][w.ci] &= ~N;
    }
  }

  function closeWallEdge(g, w) {
    if (w.ax === "E") {
      g[w.ri][w.ci] |= E;
      g[w.ri][w.ci + 1] |= W;
    } else {
      g[w.ri][w.ci] |= S;
      g[w.ri + 1][w.ci] |= N;
    }
  }

  function twoByTwoIsOpenBox(g, r, c) {
    return !(g[r][c] & E) && !(g[r][c] & S) && !(g[r][c + 1] & S) && !(g[r + 1][c] & E);
  }

  var NEAR_START_BREAK_MAX_STEPS = 3;
  var FIRST_LEVEL_LOOP_MAX_STEPS = 4;

  function bfsDistancesFromStart() {
    return bfsDistancesFromOriginInGrid(grid, rows, cols, 0, 0);
  }

  function wallIsOpen(g, w) {
    if (w.ax === "E") {
      return !(g[w.ri][w.ci] & E);
    }
    return !(g[w.ri][w.ci] & S);
  }

  function wallEndpointCells(w) {
    if (w.ax === "E") {
      return [
        [w.ri, w.ci],
        [w.ri, w.ci + 1],
      ];
    }
    return [
      [w.ri, w.ci],
      [w.ri + 1, w.ci],
    ];
  }

  function wallEndpointWithinSteps(dist, ends, maxSteps) {
    var d0 = dist[ends[0][0]][ends[0][1]];
    var d1 = dist[ends[1][0]][ends[1][1]];
    return (
      (d0 >= 0 && d0 <= maxSteps) ||
      (d1 >= 0 && d1 <= maxSteps)
    );
  }

  function punchedNearStartOk(g, punchedList) {
    var dist = bfsDistancesFromStart();
    var pi;
    for (pi = 0; pi < punchedList.length; pi++) {
      var w = punchedList[pi];
      if (!wallIsOpen(g, w)) {
        continue;
      }
      var ends = wallEndpointCells(w);
      if (wallEndpointWithinSteps(dist, ends, NEAR_START_BREAK_MAX_STEPS)) {
        return true;
      }
    }
    return false;
  }

  function ensureNearStartBreak(g, r, c, punchedList) {
    var attempts = 0;
    while (attempts++ < 100) {
      if (punchedNearStartOk(g, punchedList)) {
        return;
      }
      var dist = bfsDistancesFromStart();
      var walls = listClosedInternalWalls(g, r, c);
      var candidates = [];
      var wi;
      for (wi = 0; wi < walls.length; wi++) {
        var w = walls[wi];
        var ends = wallEndpointCells(w);
        if (wallEndpointWithinSteps(dist, ends, NEAR_START_BREAK_MAX_STEPS)) {
          candidates.push(w);
        }
      }
      shuffleInPlace(candidates);
      if (!candidates.length) {
        return;
      }
      openWallEdge(g, candidates[0]);
      punchedList.push(candidates[0]);
      breakOpenTwoByTwo(g, r, c);
    }
  }

  function breakOpenTwoByTwo(g, r, c) {
    var safety = 0;
    while (safety++ < 200) {
      var ri;
      var ci;
      var foundRi = -1;
      var foundCi = -1;
      for (ri = 0; ri < r - 1; ri++) {
        for (ci = 0; ci < c - 1; ci++) {
          if (twoByTwoIsOpenBox(g, ri, ci)) {
            foundRi = ri;
            foundCi = ci;
            break;
          }
        }
        if (foundRi >= 0) break;
      }
      if (foundRi < 0) {
        return;
      }
      var choices = [
        { ax: "E", ri: foundRi, ci: foundCi },
        { ax: "S", ri: foundRi, ci: foundCi },
        { ax: "S", ri: foundRi, ci: foundCi + 1 },
        { ax: "E", ri: foundRi + 1, ci: foundCi },
      ];
      shuffleInPlace(choices);
      closeWallEdge(g, choices[0]);
    }
  }

  function bfsDistancesFromOriginInGrid(g, r, c, startR, startC) {
    var dist = [];
    var ri;
    var ci;
    for (ri = 0; ri < r; ri++) {
      dist.push([]);
      for (ci = 0; ci < c; ci++) {
        dist[ri].push(-1);
      }
    }
    var q = [[startR, startC]];
    dist[startR][startC] = 0;
    var qi = 0;
    while (qi < q.length) {
      var cur = q[qi++];
      var cr = cur[0];
      var cc = cur[1];
      var base = dist[cr][cc];
      var nbs = walkNeighborsInGrid(g, r, c, cr, cc);
      var ni;
      for (ni = 0; ni < nbs.length; ni++) {
        var nb = nbs[ni];
        var nr = nb[0];
        var nc = nb[1];
        if (dist[nr][nc] >= 0) {
          continue;
        }
        dist[nr][nc] = base + 1;
        q.push([nr, nc]);
      }
    }
    return dist;
  }

  function hasLoopNearStart(g, r, c, maxSteps) {
    var dist = bfsDistancesFromOriginInGrid(g, r, c, 0, 0);
    var alive = [];
    var deg = [];
    var ri;
    var ci;
    for (ri = 0; ri < r; ri++) {
      alive.push([]);
      deg.push([]);
      for (ci = 0; ci < c; ci++) {
        alive[ri].push(dist[ri][ci] >= 0);
        deg[ri].push(walkNeighborsInGrid(g, r, c, ri, ci).length);
      }
    }
    var q = [];
    for (ri = 0; ri < r; ri++) {
      for (ci = 0; ci < c; ci++) {
        if (alive[ri][ci] && deg[ri][ci] <= 1) {
          q.push([ri, ci]);
        }
      }
    }
    var qi = 0;
    while (qi < q.length) {
      var cur = q[qi++];
      var cr = cur[0];
      var cc = cur[1];
      if (!alive[cr][cc] || deg[cr][cc] > 1) {
        continue;
      }
      alive[cr][cc] = false;
      var nbs = walkNeighborsInGrid(g, r, c, cr, cc);
      var ni;
      for (ni = 0; ni < nbs.length; ni++) {
        var nb = nbs[ni];
        var nr = nb[0];
        var nc = nb[1];
        if (!alive[nr][nc]) {
          continue;
        }
        deg[nr][nc]--;
        if (deg[nr][nc] <= 1) {
          q.push([nr, nc]);
        }
      }
    }
    for (ri = 0; ri < r; ri++) {
      for (ci = 0; ci < c; ci++) {
        if (alive[ri][ci] && dist[ri][ci] >= 0 && dist[ri][ci] <= maxSteps) {
          return true;
        }
      }
    }
    return false;
  }

  function bfsReachableAvoidExit(g, r, c) {
    var gr = r - 1;
    var gc = c - 1;
    var vis = {};
    var q = [[0, 0]];
    vis[cellKey(0, 0)] = true;
    var qi = 0;
    while (qi < q.length) {
      var cur = q[qi++];
      var cr = cur[0];
      var cc = cur[1];
      var nbs = walkNeighborsInGrid(g, r, c, cr, cc);
      var ni;
      for (ni = 0; ni < nbs.length; ni++) {
        var nb = nbs[ni];
        var nr = nb[0];
        var nc = nb[1];
        if (nr === gr && nc === gc) {
          continue;
        }
        var k = cellKey(nr, nc);
        if (vis[k]) {
          continue;
        }
        vis[k] = true;
        q.push([nr, nc]);
      }
    }
    return vis;
  }

  function findWallConnectingVisToTrapped(g, r, c, vis, gr, gc) {
    var walls = listClosedInternalWalls(g, r, c);
    shuffleInPlace(walls);
    var wi;
    for (wi = 0; wi < walls.length; wi++) {
      var wall = walls[wi];
      var ends = wallEndpointCells(wall);
      var a = ends[0];
      var b = ends[1];
      var va = !!vis[cellKey(a[0], a[1])];
      var vb = !!vis[cellKey(b[0], b[1])];
      var ga = a[0] === gr && a[1] === gc;
      var gb = b[0] === gr && b[1] === gc;
      if (va && !vb && !gb) {
        return wall;
      }
      if (vb && !va && !ga) {
        return wall;
      }
    }
    return null;
  }

  function findWallTouchingTrapped(g, r, c, vis, gr, gc) {
    var walls = listClosedInternalWalls(g, r, c);
    shuffleInPlace(walls);
    var wi;
    for (wi = 0; wi < walls.length; wi++) {
      var wall = walls[wi];
      var ends = wallEndpointCells(wall);
      var ai;
      for (ai = 0; ai < 2; ai++) {
        var p = ends[ai];
        if (p[0] === gr && p[1] === gc) {
          continue;
        }
        if (!vis[cellKey(p[0], p[1])]) {
          return wall;
        }
      }
    }
    return null;
  }

  function ensureReachableWithoutUsingExit(g, r, c) {
    var gr = r - 1;
    var gc = c - 1;
    var safety = 0;
    while (safety++ < 400) {
      var vis = bfsReachableAvoidExit(g, r, c);
      var ri;
      var ci;
      var allOk = true;
      for (ri = 0; ri < r; ri++) {
        for (ci = 0; ci < c; ci++) {
          if (ri === gr && ci === gc) {
            continue;
          }
          if (!vis[cellKey(ri, ci)]) {
            allOk = false;
            break;
          }
        }
        if (!allOk) {
          break;
        }
      }
      if (allOk) {
        return;
      }
      var w =
        findWallConnectingVisToTrapped(g, r, c, vis, gr, gc) ||
        findWallTouchingTrapped(g, r, c, vis, gr, gc);
      if (!w) {
        return;
      }
      openWallEdge(g, w);
      breakOpenTwoByTwo(g, r, c);
    }
  }

  function punchExtraPassages(g, r, c) {
    var walls = listClosedInternalWalls(g, r, c);
    var k = Math.floor(walls.length * 0.15);
    shuffleInPlace(walls);
    var used = [];
    var ri;
    var ci;
    for (ri = 0; ri < r; ri++) {
      used.push([]);
      for (ci = 0; ci < c; ci++) {
        used[ri].push(false);
      }
    }
    var chosen = [];
    var i;
    for (i = 0; i < walls.length && chosen.length < k; i++) {
      var w = walls[i];
      var r0;
      var c0;
      var r1;
      var c1;
      if (w.ax === "E") {
        r0 = w.ri;
        c0 = w.ci;
        r1 = w.ri;
        c1 = w.ci + 1;
      } else {
        r0 = w.ri;
        c0 = w.ci;
        r1 = w.ri + 1;
        c1 = w.ci;
      }
      if (used[r0][c0] || used[r1][c1]) {
        continue;
      }
      used[r0][c0] = true;
      used[r1][c1] = true;
      chosen.push(w);
    }
    for (i = 0; i < chosen.length; i++) {
      openWallEdge(g, chosen[i]);
    }
    return chosen;
  }

  function layoutMaze() {
    var cw = canvas.clientWidth;
    var ch = canvas.clientHeight;
    if (cw < 1 || ch < 1) {
      cw = 500;
      ch = 508;
    }
    rows = 5 + currentLevel;
    cols = 5 + currentLevel;
    cellSize = Math.floor(Math.min(cw / cols, ch / rows));
    mazeW = cols * cellSize;
    mazeH = rows * cellSize;
    offsetX = Math.floor((cw - mazeW) / 2);
    offsetY = Math.floor((ch - mazeH) / 2);
  }

  var lcParticles = [];
  var lcAnimId = null;
  var FIREWORK_COLORS = [
    [255, 220, 60], [255, 100, 80], [80, 220, 255],
    [120, 255, 140], [255, 140, 220], [255, 180, 40],
  ];

  function spawnFireworkBurst(cx, cy, count) {
    var ci;
    for (ci = 0; ci < count; ci++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = 200 + Math.random() * 420;
      var col = FIREWORK_COLORS[(Math.random() * FIREWORK_COLORS.length) | 0];
      lcParticles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: col[0], g: col[1], b: col[2],
        life: 1,
        decay: 1.35 + Math.random() * 0.95,
        size: 5 + Math.random() * 7,
      });
    }
  }

  function runLevelClearEffect() {
    levelClearOverlay.classList.add("active");
    levelClearText.style.animation = "none";
    void levelClearText.offsetWidth;
    levelClearText.style.animation = "";
    var w = levelClearOverlay.offsetWidth;
    var h = levelClearOverlay.offsetHeight;
    levelClearCanvas.width = w;
    levelClearCanvas.height = h;
    lcParticles.length = 0;
    spawnFireworkBurst(w * 0.5, h * 0.36, 56);
    spawnFireworkBurst(w * 0.16, h * 0.3, 34);
    spawnFireworkBurst(w * 0.84, h * 0.3, 34);
    var lcCtx = levelClearCanvas.getContext("2d");
    var lastT = performance.now();
    function tick(now) {
      var dt = Math.min((now - lastT) / 1000, 0.05);
      lastT = now;
      lcCtx.clearRect(0, 0, w, h);
      var i;
      for (i = lcParticles.length - 1; i >= 0; i--) {
        var p = lcParticles[i];
        p.life -= p.decay * dt;
        if (p.life <= 0) {
          lcParticles.splice(i, 1);
          continue;
        }
        p.vy += 320 * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= (1 - 1.8 * dt);
        var a = p.life * p.life;
        lcCtx.globalAlpha = a;
        lcCtx.fillStyle = "rgb(" + p.r + "," + p.g + "," + p.b + ")";
        lcCtx.shadowColor = "rgba(" + p.r + "," + p.g + "," + p.b + "," + (a * 0.7).toFixed(2) + ")";
        lcCtx.shadowBlur = p.size * 2.8;
        lcCtx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      }
      lcCtx.globalAlpha = 1;
      lcCtx.shadowBlur = 0;
      if (lcParticles.length) {
        lcAnimId = requestAnimationFrame(tick);
      } else {
        lcAnimId = null;
        levelClearOverlay.classList.remove("active");
      }
    }
    if (lcAnimId) {
      cancelAnimationFrame(lcAnimId);
    }
    lcAnimId = requestAnimationFrame(tick);
  }

  function onLevelComplete() {
    shopAfterLevel = currentLevel;
    updateCoinCounterUi();
    runLevelClearEffect();
    showShopOverlay();
  }

  function startLevel() {
    layoutMaze();
    var punchedWalls;
    do {
      grid = generateMaze(rows, cols);
      punchedWalls = punchExtraPassages(grid, rows, cols);
      breakOpenTwoByTwo(grid, rows, cols);
      ensureNearStartBreak(grid, rows, cols, punchedWalls);
      ensureReachableWithoutUsingExit(grid, rows, cols);
    } while (currentLevel === 1 && !hasLoopNearStart(grid, rows, cols, FIRST_LEVEL_LOOP_MAX_STEPS));
    playerR = 0;
    playerC = 0;
    playerGlideActive = false;
    bufferedPlayerDir = null;
    monsterR = rows - 1;
    monsterC = cols - 1;
    monsterGlideActive = false;
    monsterChaseQueue.length = 0;
    monsterFearPreviewCache = null;
    spawnedEnemies = [];
    invulnerableUntilMs = 0;
    magnetUntilMs = 0;
    fearUntilMs = 0;
    fearPickupWaveStartMs = 0;
    phaseUntilMs = 0;
    monsterStunnedUntilMs = 0;
    playerPickupFlashes = [];
    banishImpRings = [];
    pendingBanishImpCount = 0;
    lastGameTickMs = 0;
    var startT = performance.now();
    monsterGrowStartMs = startT;
    fastEggGapsRemaining = Math.max(0, currentLevel - 1);
    nextEggDropAt = startT + consumeNextEggDropGapMs();
    hideAllGameOverlays();
    resetCooldowns();
    scatterCoins();
    scatterOwnedPowerupsOnLevel();
    updateCoinCounterUi();
    draw();
  }

  function startRun() {
    currentLevel = 1;
    goldWallet = 0;
    cooldownReductionPurchases = 0;
    wallBreakCharges = 0;
    invulnerableUntilMs = 0;
    magnetUntilMs = 0;
    fearUntilMs = 0;
    fearPickupWaveStartMs = 0;
    phaseUntilMs = 0;
    monsterStunnedUntilMs = 0;
    lastGameTickMs = 0;
    ownedPowerups = [];
    shopAfterLevel = 0;
    hideAllGameOverlays();
    startLevel();
  }

  function resetRun() {
    startRun();
  }

  function drawCanvasEmoji(ctx, emoji, x, y, fontSizePx, tintCssColor) {
    if (fontSizePx < 3) {
      return;
    }
    y += EMOJI_DRAW_OFFSET_Y;
    var fs = Math.round(fontSizePx);
    var fontStr =
      fs +
      'px "Segoe UI Symbol", system-ui, "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
    if (!tintCssColor) {
      ctx.save();
      ctx.font = fontStr;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(emoji, x, y);
      ctx.restore();
      return;
    }
    var sw = Math.ceil(fs * 1.5 + 10);
    var sh = Math.ceil(fs * 1.35 + 10);
    if (!emojiTintCanvas) {
      emojiTintCanvas = document.createElement("canvas");
    }
    if (emojiTintCanvas.width < sw) {
      emojiTintCanvas.width = sw;
    }
    if (emojiTintCanvas.height < sh) {
      emojiTintCanvas.height = sh;
    }
    var c2 = emojiTintCanvas.getContext("2d");
    c2.clearRect(0, 0, sw, sh);
    c2.font = fontStr;
    c2.textAlign = "center";
    c2.textBaseline = "middle";
    c2.fillText(emoji, sw / 2, sh / 2);
    c2.globalCompositeOperation = "source-atop";
    c2.fillStyle = tintCssColor;
    c2.fillRect(0, 0, sw, sh);
    c2.globalCompositeOperation = "source-over";
    ctx.drawImage(emojiTintCanvas, 0, 0, sw, sh, x - sw / 2, y - sh / 2, sw, sh);
  }

  function drawGoldPickupDisc(ctx, cx, cy, cellSize) {
    var rad = Math.max(3, cellSize * 0.14);
    var grd = ctx.createRadialGradient(cx - rad * 0.35, cy - rad * 0.35, rad * 0.15, cx, cy, rad);
    grd.addColorStop(0, "#fff4a8");
    grd.addColorStop(0.45, "#e8c030");
    grd.addColorStop(1, "#a67c10");
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(cx, cy, rad, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#8a6a18";
    ctx.lineWidth = Math.max(1, cellSize * 0.04);
    ctx.stroke();
  }

  function puStrokeStd(ctx, cellSize, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(1, cellSize * 0.04);
    ctx.stroke();
  }

  function puHighlight(ctx, cx, cy, rad) {
    var hg = ctx.createRadialGradient(
      cx - rad * 0.3,
      cy - rad * 0.35,
      rad * 0.05,
      cx - rad * 0.1,
      cy - rad * 0.15,
      rad * 0.55,
    );
    hg.addColorStop(0, "rgba(255,255,255,0.55)");
    hg.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = hg;
    ctx.beginPath();
    ctx.arc(cx, cy, rad, 0, Math.PI * 2);
    ctx.fill();
  }

  var POWERUP_MAZE_VISUAL_SCALE = 1.4;

  var POWERUP_DRAW = {
    cooldown: function (ctx, px, py, cellSize) {
      var cr = Math.max(3.3, cellSize * 0.154);
      var grd = ctx.createRadialGradient(px - cr * 0.3, py - cr * 0.3, cr * 0.1, px, py, cr);
      grd.addColorStop(0, "#e8bfff");
      grd.addColorStop(0.4, "#c080ff");
      grd.addColorStop(1, "#7040b0");
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(px, py, cr, 0, Math.PI * 2);
      ctx.fill();
      puStrokeStd(ctx, cellSize, "#9050d8");
      puHighlight(ctx, px, py, cr);
      var hand = Math.max(1.1, cellSize * 0.0385);
      ctx.strokeStyle = "rgba(255,255,255,0.75)";
      ctx.lineWidth = hand;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px, py - cr * 0.55);
      ctx.moveTo(px, py);
      ctx.lineTo(px + cr * 0.4, py + cr * 0.1);
      ctx.stroke();
    },
    wall: function (ctx, px, py, cellSize) {
      var ws = 1.15;
      var bw = Math.max(7.5 * ws, cellSize * 0.275 * ws);
      var bh = Math.max(6.25 * ws, cellSize * 0.2 * ws);
      var rx = px - bw / 2;
      var ry = py - bh / 2;
